<script id="fs-patch-script">
(function(){
  function getVisibleContainer(){
    var c = document.getElementById('chartContainer');
    var p = document.getElementById('powerChartContainer');
    var vis = function(el){
      if (!el) return false;
      var cs = window.getComputedStyle(el);
      if (!cs) return el.offsetParent !== null;
      return cs.display !== 'none' && cs.visibility !== 'hidden' && el.offsetParent !== null;
    };
    return vis(c) ? c : (vis(p) ? p : (p || c));
  }

  window.toggleFullscreenCharts = function(){
    var target = getVisibleContainer();
    if (!target) return;

    if (!document.body.__fsOn){
      var overlay = document.createElement('div');
      overlay.id = 'chartsFullscreenLayer';
      overlay.addEventListener('click', function(e){ if (e.target === overlay) exitFS(); });
      overlay.__onEsc = function(ev){ if ((ev.key||'') === 'Escape') exitFS(); };
      document.addEventListener('keydown', overlay.__onEsc);
      document.body.appendChild(overlay);

      document.body.__fsOn = {
        target: target,
        parent: target.parentNode,
        next: target.nextSibling,
        minHeight: target.style.minHeight
      };

      overlay.appendChild(target);
      target.style.minHeight = '68vh';

      var canvas = target.querySelector('canvas');
      if (canvas){
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.maxHeight = 'none';
      }

      try{ if (typeof window.updateChart==='function') window.updateChart(); }catch(e){}
      ensureFSButton();
    } else {
      exitFS();
    }

    function exitFS(){
      var st = document.body.__fsOn || {};
      var overlay = document.getElementById('chartsFullscreenLayer');
      if (st.target && st.parent){
        if (st.next) st.parent.insertBefore(st.target, st.next); else st.parent.appendChild(st.target);
        st.target.style.minHeight = st.minHeight || '';
        var canvas = st.target.querySelector('canvas');
        if (canvas){ canvas.style.width = ''; canvas.style.height = ''; }
      }
      if (overlay){
        try { document.removeEventListener('keydown', overlay.__onEsc); } catch(e) {}
        overlay.remove();
      }
      document.body.__fsOn = null;
      try{ if (typeof window.updateChart==='function') window.updateChart(); }catch(e){}
      ensureFSButton();
    }
  };

  window.ensureFSButton = function(){
    var target = getVisibleContainer();
    if (!target) return;
    if (window.getComputedStyle(target).position === 'static') target.style.position = 'relative';

    var btn = document.getElementById('btnToggleFullscreenCharts');
    if (!btn){
      btn = document.createElement('button');
      btn.id = 'btnToggleFullscreenCharts';
      btn.type = 'button';
      btn.title = 'Fullscreen / Exit';
      btn.textContent = '⤢';
      btn.addEventListener('click', window.toggleFullscreenCharts);
    }
    if (btn.parentNode !== target) target.appendChild(btn);
  };

  function initFS(){
    ensureFSButton();
    var c1 = document.getElementById('chartContainer');
    var c2 = document.getElementById('powerChartContainer');
    var watch = function(el){
      if(!el || el.__fsObs) return;
      var obs = new MutationObserver(ensureFSButton);
      obs.observe(el, {childList:true, subtree:true, attributes:true, attributeFilter:['style','class']});
      el.__fsObs = obs;
    };
    watch(c1); watch(c2);
    window.addEventListener('resize', ensureFSButton);
    document.addEventListener('keydown', function(e){ if ((e.key||'').toLowerCase()==='f') window.toggleFullscreenCharts(); });
  }

  if (document.readyState === 'complete' || document.readyState === 'interactive'){
    setTimeout(initFS, 0);
  } else {
    document.addEventListener('DOMContentLoaded', initFS);
    window.addEventListener('load', initFS);
  }
})();
</script>

    {match:/\bGenerator\b.*windings temperature\s*2\b.*10M/i, limit:150},
    {match:/\bGenerator\b.*windings temperature\s*3\b.*10M/i, limit:150},
    {match:/\bGenerator\b.*sliprings temperature\b.*10M/i, limit:75},
    {match:/\bTrafo\s*1\b.*winding temperature\b.*10M/i, limit:140},
    {match:/\bTrafo\s*2\b.*winding temperature\b.*10M/i, limit:140},
    {match:/\bTrafo\s*3\b.*winding temperature\b.*10M/i, limit:140},
  ];

  function toNumber(v){
    if (v==null) return NaN;
    let s = String(v).trim().replace(/\u00a0/g,'').replace(/\s+/g,' ');
    // Replace comma decimal if present
    if ((s.match(/,/g)||[]).length > (s.match(/\./g)||[]).length) {
      s = s.replace(/\./g,'').replace(/,/g,'.');
    } else {
      s = s.replace(/,/g,'');
    }
    const n = Number(s);
    return isFinite(n) ? n : NaN;
  }

  function buildColumnMap(table){
    const map = {}; // colIndex -> {limit}
    const ths = (table.tHead && table.tHead.rows[0]) ? Array.from(table.tHead.rows[0].cells) : [];
    ths.forEach((th, i) => {
      const label = (th.textContent||'').trim();
      for (const r of LIMITS){
        if (r.match.test(label)){
          map[i] = {limit: r.limit, label};
          break;
        }
      }
    });
    return map;
  }

  function applyLimits(table){
    if (!table) return;
    const colMap = buildColumnMap(table);
    if (!Object.keys(colMap).length) return; // nothing to do

    const bodies = table.tBodies ? Array.from(table.tBodies) : [];
    bodies.forEach(tb => {
      Array.from(tb.rows).forEach(tr => {
        Array.from(tr.cells).forEach((td, i) => {
          const rule = colMap[i];
          if (!rule) return;
          const val = toNumber(td.textContent);
          if (isNaN(val)) return;
          // mark near-limit if >90% of limit, over-limit if >limit
          td.classList.remove('over-limit','near-limit');
          if (val > rule.limit) td.classList.add('over-limit');
          else if (val >= rule.limit*0.9) td.classList.add('near-limit');
        });
      });
    });
  }

  function run(){
    const tbl = document.getElementById('dataTable') || document.querySelector('table');
    applyLimits(tbl);
  }

  // Hook into buildTable if present
  const _bt = window.buildTable;
  if (typeof _bt === 'function'){
    window.buildTable = function(){ const r=_bt.apply(this, arguments); run(); return r; };
  }
  window.addEventListener('DOMContentLoaded', run);
  window.addEventListener('load', run);
})();
</script>
<script>
/* === Build "Exceedances" table ignoring Aggregation Interval filter when possible === */
(function(){
  if (window.__exceed_table__) return; window.__exceed_table__ = true;

  // reuse LIMITS from previous script if present; otherwise define here too
  var LIMITS = (window.__LIMITS_MAP__) || [
    {match:/\bBearing\s+D\.?E\.?\s+Temperature\b.*10M/i, limit:95, key:'Bearing D.E. Temperature max 10M (ºC)'},
    {match:/\bBearing\s+N\.?D\.?E\.?\s+Temperature\b.*10M/i, limit:95, key:'Bearing N.D.E. Temperature max 10M (ºC)'},
    {match:/\bGearbox\b.*bearing temperature\b.*10M/i, limit:88, key:'Gearbox bearing temperature max 10M (ºC)'},
    {match:/\bGearbox\b.*oil temperature\b.*10M/i, limit:75, key:'Gearbox oil temperature max 10M (ºC)'},
    {match:/\bGenerator\b.*windings temperature\s*1\b.*10M/i, limit:150, key:'Generator windings temperature 1 max 10M (ºC)'},
    {match:/\bGenerator\b.*windings temperature\s*2\b.*10M/i, limit:150, key:'Generator windings temperature 2 max 10M (ºC)'},
    {match:/\bGenerator\b.*windings temperature\s*3\b.*10M/i, limit:150, key:'Generator windings temperature 3 max 10M (ºC)'},
    {match:/\bGenerator\b.*sliprings temperature\b.*10M/i, limit:75, key:'Generator’s sliprings temperature max 10M (ºC)'},
    {match:/\bTrafo\s*1\b.*winding temperature\b.*10M/i, limit:140, key:'Trafo 1 winding temperature max 10M (ºC)'},
    {match:/\bTrafo\s*2\b.*winding temperature\b.*10M/i, limit:140, key:'Trafo 2 winding temperature max 10M (ºC)'},
    {match:/\bTrafo\s*3\b.*winding temperature\b.*10M/i, limit:140, key:'Trafo 3 winding temperature max 10M (ºC)'},
  ];
  window.__LIMITS_MAP__ = LIMITS;

  function toNumber(v){
    if (v==null) return NaN;
    var s = String(v).trim().replace(/\u00a0/g,'').replace(/\s+/g,' ');
    if ((s.match(/,/g)||[]).length > (s.match(/\./g)||[]).length) { s = s.replace(/\./g,'').replace(/,/g,'.'); }
    else { s = s.replace(/,/g,''); }
    var n = Number(s); return isFinite(n)?n:NaN;
  }

  function guessFullDataset(){
    // Try common globals from the app
    var candidates = ['fullData','allData','rawData','originalData','masterData','dataset','data','_allRows','__all'];
    for (var i=0;i<candidates.length;i++){
      var g = window[candidates[i]];
      if (Array.isArray(g) && g.length && typeof g[0]==='object') return g;
    }
    return null;
  }

  function buildColumnIndexFromHead(table){
    var map = {}; // label(normalized) -> index
    if (!table || !table.tHead) return map;
    var ths = table.tHead.rows[0] ? Array.from(table.tHead.rows[0].cells) : [];
    ths.forEach(function(th,i){ map[(th.textContent||'').trim()] = i; });
    return map;
  }

  function findColumnByRegex(headMap, regex){
    for (var label in headMap){
      if (regex.test(label)) return headMap[label];
    }
    return -1;
  }

  function computeExceedsFromDOM(table){
    var out = [];
    if (!table) return out;
    var headMap = buildColumnIndexFromHead(table);
    var dateIdx = findColumnByRegex(headMap, /\bDate\b/i);
    var devIdx  = findColumnByRegex(headMap, /\bDevice\b|\bWTG\b|\bWTG Tag\b/i);
    var body = table.tBodies[0];
    if (!body) return out;
    var colRules = Object.keys(headMap).map(function(label){
      var rule = null; for (var i=0;i<LIMITS.length;i++){ if (LIMITS[i].match.test(label)) { rule = LIMITS[i]; break; } }
      return {idx: headMap[label], label: label, rule: rule};
    }).filter(function(x){ return x.rule; });

    Array.from(body.rows).forEach(function(tr){
      var date = (tr.cells[dateIdx] && tr.cells[dateIdx].textContent.trim()) || '';
      var dev  = (tr.cells[devIdx] && tr.cells[devIdx].textContent.trim()) || '';
      colRules.forEach(function(cr){
        var td = tr.cells[cr.idx]; if (!td) return;
        var val = toNumber(td.textContent);
        if (!isNaN(val) && val > cr.rule.limit){
          out.push({device: dev, variable: cr.label, date: date, value: val, limit: cr.rule.limit});
        }
      });
    });
    return out;
  }

  function computeExceedsFromObjects(rows){
    var out = [];
    if (!rows || !rows.length) return out;
    // Try to map keys by regex
    var sample = rows[0];
    function keyBy(re){ for (var k in sample){ if (re.test(k)) return k; } return null; }
    var kDate = keyBy(/\bDate\b/i);
    var kDev  = keyBy(/\bDevice\b|\bWTG\b|\bWTG Tag\b/i);
    var keysWithRules = [];
    LIMITS.forEach(function(r){
      var k = keyBy(r.match);
      if (k) keysWithRules.push({key:k, rule:r});
    });
    if (!kDate || !kDev || !keysWithRules.length) return out;
    rows.forEach(function(row){
      var date = row[kDate], dev = row[kDev];
      keysWithRules.forEach(function(kr){
        var val = toNumber(row[kr.key]);
        if (!isNaN(val) && val > kr.rule.limit){
          out.push({device: dev, variable: kr.key, date: date, value: val, limit: kr.rule.limit});
        }
      });
    });
    return out;
  }

  function renderTable(exceeds){
    var wrap = document.getElementById('exceedWrap');
    if (!wrap){
      wrap = document.createElement('section');
      wrap.id = 'exceedWrap';
      wrap.innerHTML = '<header><h3>Exceedances analysis (ignore Aggregation Interval)</h3><div class="actions"><button id="exceedCsvBtn">Download CSV</button></div></header><div class="inner"></div>';
      // Append at the bottom of main content:
      (document.getElementById('main') || document.body).appendChild(wrap);
    }
    var inner = wrap.querySelector('.inner');
    if (!exceeds.length){ inner.innerHTML = '<div class="empty">No exceedances found.</div>'; return; }
    var html = ['<div style="max-height:340px; overflow:auto;"><table id="exceedTable"><thead><tr><th>Device</th><th>Variable</th><th>Date & Time</th><th style="text-align:right">Value</th><th style="text-align:right">Limit</th></tr></thead><tbody>'];
    exceeds.forEach(function(x){
      html.push('<tr><td>'+escapeHtml(String(x.device||''))+'</td><td>'+escapeHtml(String(x.variable||''))+'</td><td>'+escapeHtml(String(x.date||''))+'</td><td class="v">'+String(x.value)+'</td><td class="v">'+String(x.limit)+'</td></tr>');
    });
    html.push('</tbody></table></div>');
    inner.innerHTML = html.join('');
    // CSV download
    var btn = document.getElementById('exceedCsvBtn');
    if (btn){
      btn.onclick = function(){
        var rows = [['Device','Variable','Date & Time','Value','Limit']].concat(exceeds.map(function(x){ return [x.device, x.variable, x.date, x.value, x.limit]; }));
        var csv = rows.map(r=> r.map(f=> `"${String(f).replace(/"/g,'""')}"`).join(',')).join('\n');
        var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a'); a.href = url; a.download = 'exceedances.csv'; a.click();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 0);
      };
    }
  }

  function escapeHtml(s){ return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function run(){
    var table = document.getElementById('dataTable') || document.querySelector('table');
    var full = guessFullDataset();
    var exceeds = full ? computeExceedsFromObjects(full) : computeExceedsFromDOM(table);
    renderTable(exceeds);
  }

  // Hook after table builds and at load
  var _bt = window.buildTable;
  if (typeof _bt === 'function'){
    window.buildTable = function(){ var r=_bt.apply(this, arguments); run(); return r; };
  }
  window.addEventListener('DOMContentLoaded', run);
  window.addEventListener('load', run);
})();
</script>

<script>
/* === Robust Refresh wiring + immediate build from red cells === */
(function(){
  if (window.__exceed_fixbtn__) return; window.__exceed_fixbtn__ = true;

  function getTable(){ return document.getElementById('dataTable') || document.querySelector('table'); }
  function headerLabels(tbl){ if (!tbl || !tbl.tHead || !tbl.tHead.rows[0]) return []; return Array.from(tbl.tHead.rows[0].cells).map(th => (th.textContent||'').trim()); }
  function idxBy(labels, re){ for (let i=0;i<labels.length;i++){ if (re.test(labels[i])) return i; } return -1; }
  function toNumber(s){ if(s==null) return NaN; s=String(s).trim(); if(!s) return NaN; const c=(s.match(/,/g)||[]).length, d=(s.match(/\./g)||[]).length; if(c>d) s=s.replace(/\./g,'').replace(/,/g,'.'); else s=s.replace(/,/g,''); const n=Number(s); return isFinite(n)?n:NaN; }
  function ensureWrap(){
    let wrap = document.getElementById('exceedWrap');
    if (!wrap){
      wrap = document.createElement('section');
      wrap.id = 'exceedWrap';
      wrap.innerHTML = '<header><h3>Exceedances analysis</h3><div class="actions"><button id="exceedRefreshBtn">Refresh</button><button id="exceedCsvBtn">Download CSV</button></div></header><div class="inner"><div class="empty">No exceedances yet.</div></div>';
      (document.getElementById('main') || document.body).appendChild(wrap);
    } else {
      // ensure button exists
      if (!wrap.querySelector('#exceedRefreshBtn')){
        const actions = wrap.querySelector('.actions') || wrap.querySelector('header') || wrap;
        const btn = document.createElement('button'); btn.id='exceedRefreshBtn'; btn.textContent='Refresh';
        actions.insertBefore(btn, actions.firstChild);
      }
    }
    // toast
    if (!document.getElementById('exToast')){ const t=document.createElement('div'); t.id='exToast'; document.body.appendChild(t); }
    return wrap;
  }
  function toast(msg){ const t=document.getElementById('exToast'); if(!t) return; t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 1600); }
  function escapeHtml(s){ return s.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  function collectFromRed(){
    const tbl = getTable(); if (!tbl) return [];
    const labels = headerLabels(tbl);
    const dateIdx = idxBy(labels, /\bDate\b|Timestamp/i);
    const devIdx  = idxBy(labels, /\bDevice\b|\bWTG\b|\bWTG Tag\b|WTG\s*ID/i);
    const bodies = [];
    if (tbl.tBodies && tbl.tBodies[0]) bodies.push(tbl.tBodies[0]);
    const inner = document.querySelector('.x-virtual-tbody table tbody'); if (inner) bodies.push(inner);
    const out=[];
    bodies.forEach(body=>{
      body.querySelectorAll('td.over-limit').forEach(td=>{
        const tr = td.parentElement;
        const idx = Array.prototype.indexOf.call(tr.children, td);
        const variable = labels[idx] || ('Column ' + (idx+1));
        const val = toNumber(td.textContent);
        const device = (devIdx>=0 && tr.children[devIdx]) ? tr.children[devIdx].textContent.trim() : '';
        const date   = (dateIdx>=0 && tr.children[dateIdx]) ? tr.children[dateIdx].textContent.trim()   : '';
        const limit  = td.getAttribute('data-limit') || '';
        out.push({device, variable, date, value: val, limit});
      });
    });
    // dedupe
    const seen=new Set(), uniq=[];
    out.forEach(r=>{ const k=[r.device,r.variable,r.date,r.value].join('|'); if(!seen.has(k)){ seen.add(k); uniq.push(r);} });
    return uniq;
  }

  function render(rows){
    ensureWrap();
    const inner = document.querySelector('#exceedWrap .inner');
    if (!rows.length){ inner.innerHTML = '<div class="empty">No exceedances found.</div>'; return; }
    const html = ['<div style="max-height:340px; overflow:auto;"><table id="exceedTable"><thead><tr><th>Device</th><th>Variable</th><th>Date & Time</th><th style="text-align:right">Value</th><th style="text-align:right">Limit</th></tr></thead><tbody>'];
    rows.forEach(r=> html.push(`<tr><td>${escapeHtml(r.device||'')}</td><td>${escapeHtml(r.variable||'')}</td><td>${escapeHtml(r.date||'')}</td><td class="v">${r.value}</td><td class="v">${r.limit||''}</td></tr>`));
    html.push('</tbody></table></div>');
    inner.innerHTML = html.join('');
  }

  function build(){ const rows = collectFromRed(); render(rows); toast(rows.length?('Added '+rows.length+' exceedance(s)'):('No exceedances found')); }

  // Delegated click so it works even if button gets re-rendered
  document.addEventListener('click', function(e){
    const btn = e.target.closest && e.target.closest('#exceedRefreshBtn, button, a');
    if (!btn) return;
    const txt = (btn.textContent||'').trim().toLowerCase();
    if (btn.id==='exceedRefreshBtn' || txt==='refresh' || txt==='تحديث' || txt.includes('exceed')){
      e.preventDefault(); e.stopPropagation();
      ensureWrap(); build();
    }
  }, true);

  // Run automatically after load and after CSV choose
  window.addEventListener('load', function(){ ensureWrap(); setTimeout(build, 300); setTimeout(build, 1200); });
  document.addEventListener('change', function(e){
    const el = e.target; if (!el || el.tagName!=='INPUT' || (el.getAttribute('type')||'').toLowerCase()!=='file') return;
    setTimeout(build, 800); setTimeout(build, 2000);
  }, true);

  // Also after table rebuild
  if (typeof window.buildTable === 'function'){
    const _bt = window.buildTable;
    window.buildTable = function(){ const r=_bt.apply(this, arguments); setTimeout(build, 0); return r; };
  }
})();
</script>

<script>
(function(){
  function parseDateCell(txt){
    if(!txt) return NaN;
    var s=String(txt).trim();
    // normalize: "YYYY/MM/DD HH:mm:ss(.SSS)"
    s=s.replace(/\//g,'-').replace(' ', 'T');
    var d=new Date(s);
    if(isNaN(d)){ s=s.replace(/\.\d+$/,''); d=new Date(s); }
    return d.getTime();
  }

  function enhanceOneTable(table){
    if(!table) return;
    var thead=table.tHead, tbody=table.tBodies && table.tBodies[0];
    if(!thead || !tbody) return;

    // prevent rebinding if same node already enhanced
    if(table.__exlogEnhanced) return;
    table.__exlogEnhanced = true;

    var headers = Array.from(thead.querySelectorAll('th'));
    headers.forEach(function(th, idx){
      th.classList.add('sortable');
      // clear previous arrow if any (from a prior render)
      var old = th.querySelector('.arrow'); if(old) old.remove();
      var arrow=document.createElement('span'); arrow.className='arrow'; arrow.textContent=''; th.appendChild(arrow);

      th.addEventListener('click', function(){
        var state = th.getAttribute('data-sort') || 'none';
        var dir = state === 'asc' ? 'desc' : 'asc';
        headers.forEach(function(h){ h.removeAttribute('data-sort'); h.classList.remove('asc','desc'); var a=h.querySelector('.arrow'); if(a) a.textContent=''; });
        th.setAttribute('data-sort', dir);
        th.classList.add(dir);
        arrow.textContent = dir==='asc' ? '▲' : '▼';

        var rows = Array.from(tbody.rows);
        var isDateCol = (idx===2);
        var isNumeric = (idx===3 || idx===4);
        rows.sort(function(a,b){
          var A = a.cells[idx]?a.cells[idx].textContent.trim():'';
          var B = b.cells[idx]?b.cells[idx].textContent.trim():'';
          var va,vb;
          if(isDateCol){ va=parseDateCell(A); vb=parseDateCell(B); }
          else if(isNumeric){ va=parseFloat(A.replace(/,/g,'')); vb=parseFloat(B.replace(/,/g,'')); if(isNaN(va)) va=-Infinity; if(isNaN(vb)) vb=-Infinity; }
          else { va=A.toLowerCase(); vb=B.toLowerCase(); }
          var cmp = va<vb?-1:(va>vb?1:0);
          return dir==='asc'?cmp:-cmp;
        });
        rows.forEach(function(r){ tbody.appendChild(r); });
      });
    });
  }

  function ensureSearch(wrap, tbody){
    var actions = wrap.querySelector('header .actions') || wrap.querySelector('header');
    if(!actions) return;
    var input = document.getElementById('exceedTurbineSearch');
    if(!input){
      input = document.createElement('input');
      input.type='search';
      input.id='exceedTurbineSearch';
      input.placeholder='Search turbine (Device)...';
      input.style.marginLeft='8px';
      actions.appendChild(input);
    }
    // Rebind handler (idempotent)
    input.oninput = function(){
      var q = this.value.trim().toLowerCase();
      Array.from(tbody.rows).forEach(function(r){
        var device = r.cells[0]?r.cells[0].textContent.toLowerCase():'';
        r.style.display = !q || device.indexOf(q)!==-1 ? '' : 'none';
      });
    };
  }

  function enhanceSavedLog(){
    var wrap = document.getElementById('exceedLogWrap');
    if(!wrap) return false;
    var table = wrap.querySelector('table');
    if(!table) return false;
    var tbody = table.tBodies && table.tBodies[0]; if(!tbody) return false;
    enhanceOneTable(table);
    ensureSearch(wrap, tbody);
    return true;
  }

  // Observe the document for the Saved Log panel creation
  function waitForPanelAndEnhance(){
    if(enhanceSavedLog()) return; // already present
    var obs = new MutationObserver(function(){
      if(enhanceSavedLog()){
        obs.disconnect();
        // also watch the inner content for re-renders to re-apply on new table nodes
        var wrap = document.getElementById('exceedLogWrap');
        var target = wrap && (wrap.querySelector('.inner') || wrap);
        if(target){
          var obs2 = new MutationObserver(function(){
            // small delay to allow DOM fill
            setTimeout(enhanceSavedLog, 0);
          });
          obs2.observe(target, {childList:true, subtree:true});
        }
      }
    });
    obs.observe(document.body || document.documentElement, {childList:true, subtree:true});
  }

  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', waitForPanelAndEnhance);
  } else {
    waitForPanelAndEnhance();
  }
})();
</script>

  function hideLegacyWraps(){

    if (old) { old.style.display = 'none'; old.innerHTML = ''; }
  }
  function hideSingles(){
    var mainSingle = document.getElementById('chartContainer');
    var powerSingle = document.getElementById('powerChartContainer');

    if (powerSingle) powerSingle.style.display = 'none';
  }
  function renderMultiTurbines(data, turbs, varsExplicit, allVars){
    var wrap = ensureUnifiedWrap();
    var mainVars = (varsExplicit.length ? varsExplicit : allVars.slice()).filter(function(v){ return !isAAPVar(v); });
    var aapVarName = allVars.find(function(v){ return isAAPVar(v); });
    var wantsAAP = !!aapVarName && (!varsExplicit.length || varsExplicit.indexOf(aapVarName) !== -1);

    wrap.innerHTML = '';
    turbs.forEach(function(dev){
      var rows = data.filter(function(r){ return r && r['Device'] === dev; });
      if (!rows.length) return;
      var dates = sortDates(Array.from(new Set(rows.map(function(r){ return r['Date']; }).filter(Boolean))));
      if (!dates.length) return;

      var card = document.createElement('section');
      card.className = 'umt-card';
      card.innerHTML = '<h3 class="umt-title">Turbine ' + dev + '</h3><div class="umt-grid"></div>';

        grid.appendChild(block1);
      }

        var block2 = document.createElement('div');
        block2.className = 'umt-block';
        block2.innerHTML = '<h4>Average Active Power / Theoretical Power</h4><div class="umt-wrap"><canvas class="umt-canvas" data-role="power"></canvas><canvas class="umt-overlay"></canvas><div class="umt-tooltip"></div></div>';

      }

        var w1 = wraps[wi++];
        var c1 = w1.querySelector('.umt-canvas');
        c1.style.height = '700px';
        var mainSeries = buildDeviceSeries(rows, dates, mainVars);
        w1.__chartGeom = drawChart(c1, dates, mainSeries);
        w1.__chartSeries = mainSeries;
        w1.__chartDates = dates;
        w1.__chartType = 'main';
        w1.__chartDevice = dev;
      }

        w2.__chartDevice = dev;

    });

    wrap.style.display = wrap.children.length ? 'flex' : 'none';
    hideLegacyWraps();
    hideSingles();

  }
  function renderMultiDays(data, dev, varsExplicit, allVars){
    var wrap = ensureUnifiedWrap();
    var rowsForDev = data.filter(function(r){ return r && r['Device'] === dev; });
    var dayKeys = sortDayKeys(Array.from(new Set(rowsForDev.map(function(r){ return dayKeyOf(r['Date']); }).filter(Boolean))));
    var mainVars = (varsExplicit.length ? varsExplicit : allVars.slice()).filter(function(v){ return !isAAPVar(v); });
    var aapVarName = allVars.find(function(v){ return isAAPVar(v); });

    wrap.innerHTML = '';

      if (!dates.length) return;

      var card = document.createElement('section');

      var grid = card.querySelector('.umt-grid');

      if (mainVars.length){
        var block1 = document.createElement('div');
        block1.className = 'umt-block';
        block1.innerHTML = '<h4>Main variables</h4><div class="umt-wrap"><canvas class="umt-canvas" data-role="main"></canvas><canvas class="umt-overlay"></canvas><div class="umt-tooltip"></div></div>';
        grid.appendChild(block1);
      }
      if (wantsAAP){
        var block2 = document.createElement('div');
        block2.className = 'umt-block';
        block2.innerHTML = '<h4>Average Active Power / Theoretical Power</h4><div class="umt-wrap"><canvas class="umt-canvas" data-role="power"></canvas><canvas class="umt-overlay"></canvas><div class="umt-tooltip"></div></div>';
        grid.appendChild(block2);
      }
      if (!mainVars.length && !wantsAAP){
        var empty = document.createElement('div');
        empty.className = 'umt-empty';
        empty.textContent = 'No variables selected for this day.';
        grid.appendChild(empty);
      }

      wrap.appendChild(card);

      var wraps = Array.from(grid.querySelectorAll('.umt-wrap'));
      var wi = 0;
      if (mainVars.length){
        var w1 = wraps[wi++];
        var c1 = w1.querySelector('.umt-canvas');
        c1.style.height = '700px';
        var mainSeries = buildDeviceSeries(rows, dates, mainVars);
        w1.__chartGeom = drawChart(c1, dates, mainSeries);
        w1.__chartSeries = mainSeries;
        w1.__chartDates = dates;
        w1.__chartType = 'main';
        w1.__chartDevice = dev;
      }
      if (wantsAAP){
        var w2 = wraps[wi++];
        var c2 = w2.querySelector('.umt-canvas');
        c2.style.height = '360px';
        var powerSeries = buildPowerSeries(rows, dates, aapVarName);
        w2.__chartGeom = drawChart(c2, dates, powerSeries);
        w2.__chartSeries = powerSeries;
        w2.__chartDates = dates;
        w2.__chartType = 'power';
        w2.__chartDevice = dev;
      }
      mountSharedInteraction(card, dates);
    });

    wrap.style.display = wrap.children.length ? 'flex' : 'none';
    hideLegacyWraps();
    hideSingles();
    return true;
  }

  function install(){
    if (!window.updateChart || window.__unifiedMultiChartFinalHookInstalled) return;
    var prev = window.updateChart;
    window.updateChart = function(){
      var data = getDisplayDataArr();
      var turbs = getSelectedTurbinesArr();
      var varsExplicit = getSelectedVarsArr();
      var allVars = getVariableNamesArr();
      var wrap = ensureUnifiedWrap();

      if (Array.isArray(data) && data.length) {
        if (turbs.length > 1) {
          return renderMultiTurbines(data, turbs, varsExplicit, allVars);
        }
        if (turbs.length === 1) {
          var rowsForDev = data.filter(function(r){ return r && r['Device'] === turbs[0]; });
          var dayKeys = Array.from(new Set(rowsForDev.map(function(r){ return dayKeyOf(r['Date']); }).filter(Boolean)));
          if (dayKeys.length > 1) {
            return renderMultiDays(data, turbs[0], varsExplicit, allVars);
          }
        }
      }

      if (wrap){ wrap.style.display = 'none'; wrap.innerHTML = ''; }
      hideLegacyWraps();
      return prev.apply(this, arguments);
    };
    window.__unifiedMultiChartFinalHookInstalled = true;
  }

  function init(){
    ensureUnifiedWrap();
    install();
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

  var resizeTimer = null;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      try { if (typeof window.updateChart === 'function') window.updateChart(); } catch(e){}
    }, 100);
  });
})();
</script>

<script id="multi-chart-hq-fix-script">
(function(){
  if (window.__multiChartHQFixInstalled) return;
  window.__multiChartHQFixInstalled = true;

  function getSelectedTurbinesArr(){
    try { if (selectedTurbines && typeof selectedTurbines.forEach === 'function') return Array.from(selectedTurbines); } catch(e) {}
    try { if (window.selectedTurbines && typeof window.selectedTurbines.forEach === 'function') return Array.from(window.selectedTurbines); } catch(e) {}
    return [];
  }
  function getSelectedVarsArr(){
    try { if (selectedVars && typeof selectedVars.forEach === 'function') return Array.from(selectedVars); } catch(e) {}
    try { if (window.selectedVars && typeof window.selectedVars.forEach === 'function') return Array.from(window.selectedVars); } catch(e) {}
    return [];
  }
  function getVariableNamesArr(){
    try { if (Array.isArray(variableNames)) return variableNames.slice(); } catch(e) {}
    try { if (Array.isArray(window.variableNames)) return window.variableNames.slice(); } catch(e) {}
    return [];
  }
  function getDisplayDataArr(){
    try { if (Array.isArray(displayData)) return displayData.slice(); } catch(e) {}
    try { if (Array.isArray(window.displayData)) return window.displayData.slice(); } catch(e) {}
    return [];
  }
  function isAAPVar(name){ return String(name || '').toLowerCase().indexOf('average active power') !== -1; }
  function colorFor(i, n){
    if (typeof darkColor === 'function') return darkColor(i, n);
    var hue = (i * 360 / Math.max(1, n)) % 360;
    return 'hsl(' + hue + ', 80%, 35%)';
  }
  function parseDateValue(s){
    var str = String(s || '').trim();
    if (!str) return NaN;
    str = str.replace('T',' ');
    var parts = str.split(' ');
    var d = (parts[0] || '').split('/');
    var t = (parts[1] || '00:00:00').split(':');
    if (d.length < 3) return NaN;
    return new Date(parseInt(d[0],10), parseInt(d[1],10)-1, parseInt(d[2],10), parseInt(t[0]||0,10), parseInt(t[1]||0,10), parseInt((t[2]||'0').split('.')[0],10)).getTime();
  }
  function dayKeyOf(s){ return String(s || '').split(' ')[0] || ''; }
  function shortTimeLabel(s){ var parts = String(s || '').split(' '); return parts.length >= 2 ? parts[1].slice(0,5) : String(s || ''); }
  function sortDates(list){ return list.slice().sort(function(a,b){ return parseDateValue(a) - parseDateValue(b); }); }
  function sortDayKeys(list){ return list.slice().sort(function(a,b){ return parseDateValue(a + ' 00:00:00') - parseDateValue(b + ' 00:00:00'); }); }
  function getRowMap(rows){ var map = new Map(); rows.forEach(function(r){ map.set(r['Date'], r); }); return map; }
  function getSeriesYRange(seriesArr){
    var yMin = Infinity, yMax = -Infinity;
    (seriesArr || []).forEach(function(series){
      (series.values || []).forEach(function(v){
        if (v == null || !isFinite(v)) return;

        if (v > yMax) yMax = v;

    return { yMin:yMin, yMax:yMax };
  }
  function buildDeviceSeries(rows, dates, vars, dev){
    var rowMap = getRowMap(rows);
    return vars.map(function(vn, idx){
      return {
        label: vn,
        var: vn,
        device: dev,
        color: colorFor(idx, vars.length || 1),
        values: dates.map(function(d){ var row = rowMap.get(d); var val = row ? parseFloat(row[vn]) : NaN; return isFinite(val) ? val : null; })
      };
    });
  }
  function buildPowerSeries(rows, dates, aapVarName, dev){
    if (!aapVarName) return [];
    var rowMap = getRowMap(rows);
    var vars = getVariableNamesArr();
    var windVarName = vars.find(function(v){ return String(v).toLowerCase().indexOf('average wind speed') !== -1; });
    var tempVarName = vars.find(function(v){ return String(v).toLowerCase().indexOf('average ambient temperature') !== -1; });
    var actual = {
      label: aapVarName,
      var: aapVarName,
      device: dev,
      color: '#d62728',
      values: dates.map(function(d){ var row = rowMap.get(d); var val = row ? parseFloat(row[aapVarName]) : NaN; return isFinite(val) ? val : null; })
    };

    var fn = (typeof window.expectedPowerKWFromWSTemp === 'function') ? window.expectedPowerKWFromWSTemp : ((typeof window.expectedPowerKWFromWS === 'function') ? window.expectedPowerKWFromWS : null);

      out.push({
        label:'Theoretical Power (kW)',
        var:'Theoretical Power (kW)',
        device: dev,
        color:'#006400',
        dashed:true,
        thick:true,

          if (!row) return null;
          var ws = parseFloat(row[windVarName]);

        })

  }
  function setupOverlay(baseCanvas, overlay){

    var dpr = window.devicePixelRatio || 1;
    var rect = baseCanvas.getBoundingClientRect();
    overlay.width = Math.max(1, Math.floor(rect.width * dpr));
    overlay.height = Math.max(1, Math.floor(rect.height * dpr));
    overlay.style.width = rect.width + 'px';
    overlay.style.height = rect.height + 'px';
    var ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);
    return { ctx: ctx, rect: rect };
  }
  function drawHairline(item, idx){
    if (!item || !item.canvas || !item.overlay || !item.geom) return;
    var s = setupOverlay(item.canvas, item.overlay);
    if (!s) return;
    if (idx == null || !item.dates || !item.dates.length) return;
    var x = item.geom.leftPad + Math.max(0, Math.min(idx, item.dates.length - 1)) * item.geom.xStep;
    s.ctx.save();
    s.ctx.strokeStyle = '#d00';
    s.ctx.lineWidth = 1;
    s.ctx.beginPath();
    s.ctx.moveTo(x + 0.5, item.geom.topPad);
    s.ctx.lineTo(x + 0.5, item.geom.topPad + item.geom.chartH);
    s.ctx.stroke();
    s.ctx.restore();
  }
  function drawChartHQ(canvas, dates, seriesArr, heightPx){
    if (!canvas || !dates || !dates.length || !seriesArr || !seriesArr.length) return null;
    canvas.style.display = 'block';
    canvas.style.width = '100%';
    canvas.style.height = String(heightPx || 320) + 'px';
    var rect = canvas.getBoundingClientRect();
    var parentW = canvas.parentElement ? canvas.parentElement.clientWidth : 0;
    var width = Math.max(300, Math.floor(Math.max(rect.width || 0, canvas.clientWidth || 0, parentW || 0)));
    var height = Math.max(220, Math.floor(heightPx || parseFloat(getComputedStyle(canvas).height) || canvas.clientHeight || 320));
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(width * dpr));
    canvas.height = Math.max(1, Math.floor(height * dpr));
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    var leftPad = 60, rightPad = 20, topPad = 36, bottomPad = 48;
    var chartW = Math.max(60, width - leftPad - rightPad);
    var chartH = Math.max(60, height - topPad - bottomPad);

    var yr = getSeriesYRange(seriesArr);
    if (!yr) return null;
    var yMin = yr.yMin, yMax = yr.yMax;
    var yDenom = (yMax - yMin) || 1;
    function toY(v){ return topPad + chartH - ((v - yMin) / yDenom) * chartH; }

    function drawDeviationFill(actualSeries, theoreticalSeries){
      if (!actualSeries || !theoreticalSeries) return;
      var valsA = Array.isArray(actualSeries.values) ? actualSeries.values : [];
      var valsT = Array.isArray(theoreticalSeries.values) ? theoreticalSeries.values : [];
      var len = Math.min(valsA.length, valsT.length);
      if (len < 2) return;
      function signOf(diff){ return diff > 0 ? 1 : (diff < 0 ? -1 : 0); }
      function fillQuad(x0, yA0, yT0, x1, yA1, yT1, sign) {
        if (sign == null || !isFinite(sign)) return;
        ctx.beginPath();
        ctx.moveTo(x0, yA0); ctx.lineTo(x1, yA1); ctx.lineTo(x1, yT1); ctx.lineTo(x0, yT0);
        ctx.closePath();
        ctx.fillStyle = sign > 0 ? 'rgba(34, 197, 94, 0.18)' : (sign < 0 ? 'rgba(239, 68, 68, 0.18)' : 'rgba(148, 163, 184, 0.12)');
        ctx.fill();
      }
      ctx.save();
      ctx.beginPath(); ctx.rect(leftPad, topPad, chartW, chartH); ctx.clip();
      for (var i = 1; i < len; i++){

        if (![a0, a1, t0, t1].every(function(v){ return v != null && isFinite(v); })) continue;

        var pct0 = (t0 != null && isFinite(t0) && Math.abs(t0) > 1e-9) ? Math.abs((t0 - a0) / t0) * 100 : null;
        var pct1 = (t1 != null && isFinite(t1) && Math.abs(t1) > 1e-9) ? Math.abs((t1 - a1) / t1) * 100 : null;
        var s0 = signOf(d0), s1 = signOf(d1);
        if (s0 === 0 && s1 === 0) continue;
        if (s0 === 0) s0 = s1;
        if (s1 === 0) s1 = s0;

        if (s0 === s1) { fillQuad(x0, yA0, yT0, x1, yA1, yT1, s0); continue; }

        var frac = (d0 - d1) !== 0 ? (d0 / (d0 - d1)) : 0.5;

    var lx = leftPad, ly = 16;

    ctx.textBaseline = 'middle';
    seriesArr.forEach(function(series){

      ctx.lineWidth = 2.5;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 16, ly); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
      ctx.textAlign = 'left';

    ctx.strokeStyle = 'rgba(120,130,150,0.25)';
    ctx.lineWidth = 1;
    ctx.font = '12px Arial';
    for (var i=0; i<=5; i++){
      var t = i / 5;
      var y = topPad + chartH - t * chartH;

      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(val, leftPad - 6, y);
    }

    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(leftPad, topPad); ctx.lineTo(leftPad, topPad + chartH); ctx.lineTo(leftPad + chartW, topPad + chartH); ctx.stroke();

    var labelCount = Math.min(8, dates.length);
    var skip = Math.max(1, Math.ceil(dates.length / labelCount));
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (var j=0; j<dates.length; j+=skip){
      var x = leftPad + j * xStep;
      ctx.fillText(shortTimeLabel(dates[j]), x, topPad + chartH + 8);
    }

    var theoreticalSeries = null, actualSeries = null;
    seriesArr.forEach(function(series){
      var label = String(series.label || series.var || '').toLowerCase();
      if (!theoreticalSeries && label.indexOf('theoretical power') !== -1) theoreticalSeries = series;
      if (!actualSeries && (label.indexOf('active power') !== -1 || label.indexOf('actual power') !== -1)) actualSeries = series;
    });
    if (actualSeries && theoreticalSeries) drawDeviationFill(actualSeries, theoreticalSeries);

    seriesArr.forEach(function(series){
      ctx.strokeStyle = series.color || '#2563eb';
      ctx.lineWidth = series.thick ? 3 : 2;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath();
      var started = false;
      (series.values || []).forEach(function(v, idx){
        if (v == null || !isFinite(v)) { started = false; return; }
        var x = leftPad + idx * xStep;
        var y = toY(v);
        if (!started){ ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
      });
      ctx.stroke();
      ctx.setLineDash([]);
    });

    return { baseCanvas: canvas, leftPad:leftPad, topPad:topPad, chartW:chartW, chartH:chartH, xStep:xStep, yMin:yMin, yMax:yMax };
  }
  function formatValue(val, suffix){
    if (val == null || !isFinite(val)) return '—';
    var num = Number(val);
    return (Number.isInteger(num) ? String(num) : num.toFixed(3).replace(/0+$/,'').replace(/\.$/, '')) + (suffix || '');
  }
  function buildTooltipHTML(item, idx, activeSeries){
    if (!item || !activeSeries || idx == null) return '';
    var dateStr = (item.dates && item.dates[idx]) ? item.dates[idx] : '';
    var value = activeSeries.values ? activeSeries.values[idx] : null;
    var suffix = item.type === 'power' ? ' kW' : '';
    var extraRows = (window.__xminBuildRunningStopExtraRows ? window.__xminBuildRunningStopExtraRows(item, idx, activeSeries) : '');
    if (item.type === 'power') {
      var actualSeries = (item.series || []).find(function(s){ var label = String((s && (s.var || s.label)) || '').toLowerCase(); return label.indexOf('active power') !== -1 || label.indexOf('actual power') !== -1; });
      var theoreticalSeries = (item.series || []).find(function(s){ return String((s && (s.var || s.label)) || '').toLowerCase().indexOf('theoretical power') !== -1; });
      var actual = actualSeries && actualSeries.values ? actualSeries.values[idx] : null;
      var theoretical = theoreticalSeries && theoreticalSeries.values ? theoreticalSeries.values[idx] : null;
      var powerDifference = (actual != null && isFinite(actual) && theoretical != null && isFinite(theoretical)) ? (actual - theoretical) : null;
      var deviationPct = ((actual != null && isFinite(actual) && theoretical != null && isFinite(theoretical)) && isFinite(theoretical) && Math.abs(theoretical) > 1e-9) ? (((actual - theoretical) / theoretical) * 100) : null;
      var devColor = powerDifference == null ? 'var(--muted)' : (powerDifference >= 0 ? '#15803d' : '#dc2626');
      extraRows += '' +
        '<div class="tt-row"><span class="tt-label">Actual Power</span><span class="tt-value">' + formatValue(actual, ' kW') + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Theoretical Power</span><span class="tt-value">' + formatValue(theoretical, ' kW') + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Power Difference</span><span class="tt-value" style="color:' + devColor + '; font-weight:700;">' + (powerDifference == null ? '—' : ((powerDifference > 0 ? '+' : '') + formatValue(powerDifference, ' kW'))) + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Deviation %</span><span class="tt-value" style="color:' + devColor + '; font-weight:700;">' + (deviationPct == null ? '—' : ((deviationPct > 0 ? '+' : '') + formatValue(deviationPct, '%'))) + '</span></div>';
    }
    return '<div class="tooltip-card"><div class="tt-body">' +
      '<div class="tt-row active"><span class="tt-label">Variable</span><span class="tt-value">' + String(activeSeries.var || activeSeries.label || '') + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">Value</span><span class="tt-value">' + formatValue(value, suffix) + '</span></div>' +
      extraRows +
      '<div class="tt-row"><span class="tt-label">Turbine</span><span class="tt-value">' + String(item.device || '') + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">Time</span><span class="tt-value">' + String(dateStr || '') + '</span></div>' +
      '</div></div>';
  }
  function hideTooltip(item){ if (item && item.tooltip) item.tooltip.style.display = 'none'; }

  function redrawWrap(wrap){
    if (!wrap) return;
    var canvas = wrap.querySelector('.hq-canvas');
    if (!canvas || !wrap.__hqSeries || !wrap.__hqDates) return;
    var h = wrap.__hqHeight || (wrap.__hqType === 'power' ? 360 : 700);
    wrap.__hqGeom = drawChartHQ(canvas, wrap.__hqDates, wrap.__hqSeries, h);
    wrap.__hqItem = null;
  }
  function ensureResizeObserver(wrap){
    if (!wrap || wrap.__hqResizeObserver) return;
    if (typeof ResizeObserver === 'function') {
      var ro = new ResizeObserver(function(){
        if (wrap.__hqResizeTick) cancelAnimationFrame(wrap.__hqResizeTick);
        wrap.__hqResizeTick = requestAnimationFrame(function(){ redrawWrap(wrap); });
      });
      ro.observe(wrap);
      var canvas = wrap.querySelector('.hq-canvas');
      if (canvas) ro.observe(canvas);
      wrap.__hqResizeObserver = ro;
    }
  }

  function mountCardInteraction(card){
    if (!card) return;
    var items = Array.from(card.querySelectorAll('.hq-wrap')).map(function(wrap){
      var item = {
        wrap: wrap,
        canvas: wrap.querySelector('.hq-canvas'),
        overlay: wrap.querySelector('.hq-overlay'),
        tooltip: wrap.querySelector('.hq-tooltip'),
        geom: wrap.__hqGeom || null,
        series: wrap.__hqSeries || [],
        dates: wrap.__hqDates || [],
        type: wrap.__hqType || 'main',
        device: wrap.__hqDevice || ''
      };
      wrap.__hqItem = item;
      ensureResizeObserver(wrap);
      return item;
    }).filter(function(x){ return x.canvas && x.overlay && x.geom; });
    if (!items.length) return;

    function syncItemRefs(){
      items.forEach(function(item){
        item.geom = item.wrap.__hqGeom || item.geom;
        item.series = item.wrap.__hqSeries || item.series;
        item.dates = item.wrap.__hqDates || item.dates;
      });
    }
    function clearAll(){
      syncItemRefs();
      items.forEach(function(item){ drawHairline(item, null); hideTooltip(item); });
    }
    function showTooltip(item, evt, idx){
      syncItemRefs();
      if (!item || !item.tooltip || !item.geom || !item.series || !item.series.length) return;
      var r = item.canvas.getBoundingClientRect();
      var my = evt.clientY - r.top;
      var py = my - item.geom.topPad;
      var vCursor = item.geom.yMax - (py / item.geom.chartH) * (item.geom.yMax - item.geom.yMin);
      var best = null, bestDist = Infinity;
      (item.series || []).forEach(function(s){
        var v = s && s.values ? s.values[idx] : null;
        if (v == null || !isFinite(v)) return;
        var d = Math.abs(v - vCursor);
        if (d < bestDist) { bestDist = d; best = s; }
      });
      if (!best) { hideTooltip(item); return; }
      item.tooltip.innerHTML = buildTooltipHTML(item, idx, best);
      item.tooltip.style.display = 'block';
      item.tooltip.style.left = '0px';
      item.tooltip.style.top = '0px';
      var wrapRect = item.wrap.getBoundingClientRect();
      var x = (evt.clientX - wrapRect.left) + 12;
      var y = (evt.clientY - wrapRect.top) + 12;
      var maxX = Math.max(0, wrapRect.width - item.tooltip.offsetWidth - 8);
      var maxY = Math.max(0, wrapRect.height - item.tooltip.offsetHeight - 8);
      item.tooltip.style.left = Math.min(Math.max(0, x), maxX) + 'px';
      item.tooltip.style.top = Math.min(Math.max(0, y), maxY) + 'px';
    }
    function syncFromEvent(evt, sourceItem){
      syncItemRefs();
      if (!sourceItem || !sourceItem.geom) return;
      var r = sourceItem.canvas.getBoundingClientRect();
      var mx = evt.clientX - r.left;
      var px = mx - sourceItem.geom.leftPad;
      if (px < 0 || px > sourceItem.geom.chartW) { clearAll(); return; }
      var idx = Math.round(px / sourceItem.geom.xStep);
      items.forEach(function(item){
        drawHairline(item, idx);
        if (item !== sourceItem) hideTooltip(item);
      });
      showTooltip(sourceItem, evt, idx);
    }
    items.forEach(function(item){
      if (item.wrap.__hqBound) return;
      var moveHandler = function(evt){ syncFromEvent(evt, item); };
      item.canvas.addEventListener('mousemove', moveHandler);
      item.canvas.addEventListener('pointermove', moveHandler);
      item.canvas.addEventListener('mouseleave', clearAll);
      item.wrap.addEventListener('mouseleave', clearAll);
      item.wrap.__hqBound = true;
    });
  }

  function ensureHQWrap(){
    var wrap = document.getElementById('multiTurbineChartsHQ');
    if (!wrap){
      wrap = document.createElement('section');
      wrap.id = 'multiTurbineChartsHQ';
      var anchor = document.getElementById('chartContainer');
      if (anchor && anchor.parentNode) anchor.parentNode.insertBefore(wrap, anchor);
      else (document.getElementById('main') || document.body).appendChild(wrap);
    }
    return wrap;
  }
  function hideLegacyWraps(){
    ['multiTurbineChartsUnified','multiTurbineCharts'].forEach(function(id){ var el = document.getElementById(id); if (el) { el.style.display = 'none'; } });
  }
  function hideSingles(){ var a = document.getElementById('chartContainer'); var b = document.getElementById('powerChartContainer'); if (a) a.style.display = 'none'; if (b) b.style.display = 'none'; }
  function hideHQWrap(){ var wrap = document.getElementById('multiTurbineChartsHQ'); if (wrap) { wrap.style.display = 'none'; wrap.innerHTML = ''; } }

  function buildCard(titleText, rows, mainVars, wantsAAP, aapVarName, dev){
    var card = document.createElement('section');
    card.className = 'hq-card';
    card.innerHTML = '<h3 class="hq-title">' + titleText + '</h3><div class="hq-grid"></div>';
    var grid = card.querySelector('.hq-grid');
    var dates = sortDates(Array.from(new Set(rows.map(function(r){ return r['Date']; }).filter(Boolean))));
    if (!dates.length) return null;

    if (mainVars.length){
      var block1 = document.createElement('div');
      block1.className = 'hq-block';
      block1.innerHTML = '<h4>Main variables</h4><div class="hq-wrap"><canvas class="hq-canvas" data-role="main"></canvas><canvas class="hq-overlay"></canvas><div class="hq-tooltip"></div></div>';
      grid.appendChild(block1);
    }
    if (wantsAAP){
      var block2 = document.createElement('div');
      block2.className = 'hq-block';
      block2.innerHTML = '<h4>Average Active Power / Theoretical Power</h4><div class="hq-wrap"><canvas class="hq-canvas" data-role="power"></canvas><canvas class="hq-overlay"></canvas><div class="hq-tooltip"></div></div>';
      grid.appendChild(block2);
    }
    if (!mainVars.length && !wantsAAP){
      var empty = document.createElement('div'); empty.className = 'umt-empty'; empty.textContent = 'No variables selected.'; grid.appendChild(empty);
    }

    card.__hqRows = rows;
    card.__hqDates = dates;
    card.__hqDev = dev;
    card.__hqMainVars = mainVars;
    card.__hqWantsAAP = wantsAAP;
    card.__hqAAP = aapVarName;

    function renderCardNow(){
      var wraps = Array.from(card.querySelectorAll('.hq-wrap'));
      var wi = 0;
      if (mainVars.length){
        var w1 = wraps[wi++];
        var mainSeries = buildDeviceSeries(rows, dates, mainVars, dev);
        w1.__hqSeries = mainSeries; w1.__hqDates = dates; w1.__hqType = 'main'; w1.__hqDevice = dev; w1.__hqHeight = 700;
        redrawWrap(w1);
      }
      if (wantsAAP){
        var w2 = wraps[wi++];
        var powerSeries = buildPowerSeries(rows, dates, aapVarName, dev);
        w2.__hqSeries = powerSeries; w2.__hqDates = dates; w2.__hqType = 'power'; w2.__hqDevice = dev; w2.__hqHeight = 360;
        redrawWrap(w2);
      }
      mountCardInteraction(card);
    }
    card.__renderNow = renderCardNow;
    return card;
  }

  function renderMultiTurbinesHQ(data, turbs, varsExplicit, allVars){
    var wrap = ensureHQWrap();
    wrap.innerHTML = '';
    var mainVars = (varsExplicit.length ? varsExplicit : allVars.slice()).filter(function(v){ return !isAAPVar(v); });
    var aapVarName = allVars.find(function(v){ return isAAPVar(v); });
    var wantsAAP = !!aapVarName && (!varsExplicit.length || varsExplicit.indexOf(aapVarName) !== -1);
    turbs.forEach(function(dev){
      var rows = data.filter(function(r){ return r && r['Device'] === dev; });
      if (!rows.length) return;
      var card = buildCard('Turbine ' + dev, rows, mainVars, wantsAAP, aapVarName, dev);
      if (card) wrap.appendChild(card);
    });
    wrap.style.display = wrap.children.length ? 'flex' : 'none';
    if (wrap.children.length) {
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ Array.from(wrap.children).forEach(function(card){ if (card.__renderNow) card.__renderNow(); }); }); });
      hideLegacyWraps(); hideSingles();
      return true;
    }
    return false;
  }
  function renderMultiDaysHQ(data, dev, varsExplicit, allVars){
    var wrap = ensureHQWrap();
    wrap.innerHTML = '';
    var rowsForDev = data.filter(function(r){ return r && r['Device'] === dev; });
    var dayKeys = sortDayKeys(Array.from(new Set(rowsForDev.map(function(r){ return dayKeyOf(r['Date']); }).filter(Boolean))));
    var mainVars = (varsExplicit.length ? varsExplicit : allVars.slice()).filter(function(v){ return !isAAPVar(v); });
    var aapVarName = allVars.find(function(v){ return isAAPVar(v); });
    var wantsAAP = !!aapVarName && (!varsExplicit.length || varsExplicit.indexOf(aapVarName) !== -1);
    dayKeys.forEach(function(dayKey){
      var rows = rowsForDev.filter(function(r){ return dayKeyOf(r['Date']) === dayKey; });
      if (!rows.length) return;
      var card = buildCard('Turbine ' + dev + ' — ' + dayKey, rows, mainVars, wantsAAP, aapVarName, dev);
      if (card) wrap.appendChild(card);
    });
    wrap.style.display = wrap.children.length ? 'flex' : 'none';
    if (wrap.children.length) {
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ Array.from(wrap.children).forEach(function(card){ if (card.__renderNow) card.__renderNow(); }); }); });
      hideLegacyWraps(); hideSingles();
      return true;
    }
    return false;
  }

  function install(){
    if (!window.updateChart || window.__multiChartHQFixHookInstalled) return;
    var prev = window.updateChart;
    window.updateChart = function(){
      var data = getDisplayDataArr();
      var turbs = getSelectedTurbinesArr();
      var varsExplicit = getSelectedVarsArr();
      var allVars = getVariableNamesArr();
      if (Array.isArray(data) && data.length) {
        if (turbs.length > 1) {
          if (renderMultiTurbinesHQ(data, turbs, varsExplicit, allVars)) return true;
        }
        if (turbs.length === 1) {
          var rowsForDev = data.filter(function(r){ return r && r['Device'] === turbs[0]; });
          var dayKeys = Array.from(new Set(rowsForDev.map(function(r){ return dayKeyOf(r['Date']); }).filter(Boolean)));
          if (dayKeys.length > 1) {
            if (renderMultiDaysHQ(data, turbs[0], varsExplicit, allVars)) return true;
          }
        }
      }
      hideHQWrap();
      hideLegacyWraps();
      return prev.apply(this, arguments);
    };
    window.__multiChartHQFixHookInstalled = true;
  }

  function init(){ ensureHQWrap(); install(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

  var resizeTimer = null;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){ try { if (typeof window.updateChart === 'function') window.updateChart(); } catch(e){} }, 100);
  });
})();
</script>

<script>
/* === Exceedances Limit Fallback Patch v3 (idempotent) === */
(function(){
  if (window.__fix_exceed_limits_v3__) return; window.__fix_exceed_limits_v3__ = true;

  // 1) Map: variable name -> limit (regex)
  const LIMITS = (window.__LIMITS_MAP__) || [
    {match:/\bBearing\s+D\.?E\.?\s+Temperature\b.*10\s*M/i, limit:95},
    {match:/\bBearing\s+N\.?D\.?E\.?\s+Temperature\b.*10\s*M/i, limit:95},
    {match:/\bGearbox\b.*bearing\s+temperature\b.*10\s*M/i, limit:88},
    {match:/\bGearbox\b.*oil\s+temperature\b.*10\s*M/i, limit:75},
    {match:/\bGenerator\b.*windings\s+temperature\s*1\b.*10\s*M/i, limit:150},
    {match:/\bGenerator\b.*windings\s+temperature\s*2\b.*10\s*M/i, limit:150},
    {match:/\bGenerator\b.*windings\s+temperature\s*3\b.*10\s*M/i, limit:150},
    {match:/\bGenerator\b.*sliprings\s+temperature\b.*10\s*M/i, limit:75},
    {match:/\bTrafo\s*1\b.*winding\s+temperature\b.*10\s*M/i, limit:140},
    {match:/\bTrafo\s*2\b.*winding\s+temperature\b.*10\s*M/i, limit:140},
    {match:/\bTrafo\s*3\b.*winding\s+temperature\b.*10\s*M/i, limit:140},
  ];

  function limitFromVariable(v){
    const s = String(v||'').replace(/\s+/g,' ').trim();
    for (const r of LIMITS){ if (r.match.test(s)) return r.limit; }
    return '';
  }

  // 2) Ensure highlighted TDs have data-limit (using header text)
  function setMissingDataLimitOnHighlightedCells() {
    try{
      const tbl = document.getElementById('dataTable') || document.querySelector('table');
      if (!tbl || !tbl.tHead || !tbl.tBodies) return;
      const headerRow = (tbl.tHead.rows && tbl.tHead.rows[0]) ? tbl.tHead.rows[0] : null;
      const heads = headerRow ? Array.from(headerRow.cells).map(th => (th.textContent||'').trim()) : [];
      Array.from(tbl.tBodies).forEach(tb=>{
        Array.from(tb.rows).forEach(tr=>{
          Array.from(tr.cells).forEach((td,i)=>{
            if ((td.classList && (td.classList.contains('over-limit') || td.classList.contains('near-limit'))) 
                && !td.getAttribute('data-limit')){
              const lim = limitFromVariable(heads[i]||'');
              if (lim) td.setAttribute('data-limit', String(lim));
            }
          });
        });
      });
    }catch(_){}
  }

  // 3) Wrap data collectors once they exist (poll until available)
  function installWrappers(){
    let patched = 0;
    function wrap(name, handler){
      const fn = window[name];
      if (typeof fn === 'function' && !fn.__wrapped_for_limits){
        window[name] = function(){
          const r = fn.apply(this, arguments);
          try{ return handler(r); }catch(_){ return r; }
        };
        window[name].__wrapped_for_limits = true;
        patched++;
      }
    }
    wrap('collectFromRed', function(rows){
      (rows||[]).forEach(r=>{ if (!r.limit) r.limit = limitFromVariable(r.variable); });
      return rows;
    });
    wrap('parseRowsFromExceedTable', function(rows){
      (rows||[]).forEach(r=>{ if (!r.limit) r.limit = limitFromVariable(r.variable); });
      return rows;
    });
    // mergeIntoLog(newRows) doesn't return rows, so patch by proxy
    const m = window['mergeIntoLog'];
    if (typeof m === 'function' && !m.__wrapped_for_limits){
      window['mergeIntoLog'] = function(newRows){
        try{ (newRows||[]).forEach(r=>{ if (!r.limit) r.limit = limitFromVariable(r.variable); }); }catch(_){}
        return m.apply(this, arguments);
      };
      window['mergeIntoLog'].__wrapped_for_limits = true;
      patched++;
    }
    return patched;
  }

  // 4) Fill Limit column in DOM tables if empty
  function fillLimitInDom(){
    // Exceedances table
    const ex = document.getElementById('exceedTable');
    if (ex && ex.tBodies && ex.tBodies[0]){
      Array.from(ex.tBodies[0].rows).forEach(tr=>{
        const tds = tr.cells; if (!tds || tds.length < 5) return;
        const varText = (tds[1].textContent||'').trim();
        const limitCell = tds[4];
        if (!limitCell.textContent.trim()){
          const lim = limitFromVariable(varText);
          if (lim) limitCell.textContent = String(lim);
        }
      });
    }
    // Saved Log table (rendered inside #exceedLogInner > table or similar)
    const wrap = document.getElementById('exceedLogInner') || document.querySelector('#exceedLogWrap .inner') || document.querySelector('#exceedLogWrap') || document.querySelector('#exceedWrap .inner');
    const tbl = wrap ? wrap.querySelector('table') : null;
    if (tbl && tbl.tBodies && tbl.tBodies[0]){
      Array.from(tbl.tBodies[0].rows).forEach(tr=>{
        const tds = tr.cells; if (!tds || tds.length < 5) return;
        const varText = (tds[1].textContent||'').trim();
        const limitCell = tds[4];
        if (!limitCell.textContent.trim()){
          const lim = limitFromVariable(varText);
          if (lim) limitCell.textContent = String(lim);
        }
      });
    }
  }

  // 5) Keep trying for a short while until everything is ready
  function tick(){
    try{ setMissingDataLimitOnHighlightedCells(); }catch(_){}
    try{ fillLimitInDom(); }catch(_){}
    installWrappers();
  }

  // Initial
  document.addEventListener('DOMContentLoaded', function(){ tick(); });
  window.addEventListener('load', function(){
    tick();
    let n=0; const iv = setInterval(function(){ n++; tick(); if (n>20) clearInterval(iv); }, 500);
  });

  // React to DOM changes (table reload / new CSV)
  const mo = new MutationObserver(()=>{ tick(); });
  mo.observe(document.documentElement || document.body, {childList:true, subtree:true});

  // Expose (optional manual call)
  window.__fixExceedLimits_v3_tick = tick;

})();
</script>

<script>
(function(){
  function ready(fn){ if (document.readyState!=='loading') fn(); else document.addEventListener('DOMContentLoaded', fn); }
  ready(function(){
    var TOOLTIP_ID = 'powerTooltip';
    var CONT_ID = 'powerChartContainer';
    var origParent = null, origNext = null;

    function getTip(){ return document.getElementById(TOOLTIP_ID); }
    function getCont(){ return document.getElementById(CONT_ID); }

    function moveTipIntoContainer(){
      var tip = getTip(), cont = getCont();
      if (!tip || !cont) return;
      if (tip.parentElement === cont) return;
      // remember original position to restore later
      origParent = tip.parentElement;
      origNext = tip.nextSibling;
      // make sure container can host absolutely-positioned tooltip
      var cs = getComputedStyle(cont);
      if (cs.position === 'static') cont.style.position = 'relative';
      tip.style.position = 'absolute';
      tip.style.zIndex = '10002';
      tip.style.pointerEvents = 'none'; // tooltip itself doesn't capture, overlay does
      cont.appendChild(tip);
    }
    function restoreTipToBody(){
      var tip = getTip();
      if (!tip) return;
      // if we saved a parent, restore to its original spot; else fallback to body
      if (origParent){
        if (origNext && origNext.parentNode === origParent) origParent.insertBefore(tip, origNext);
        else origParent.appendChild(tip);
      } else {
        document.body.appendChild(tip);
      }
      tip.style.zIndex = '10002';
      tip.style.pointerEvents = 'none';
    }

    // Keep tooltip inside the fullscreen subtree
    document.addEventListener('fullscreenchange', function(){
      var cont = getCont();
      if (!cont) return;
      if (document.fullscreenElement === cont){
        moveTipIntoContainer();
      } else {
        // Exit fullscreen -> restore tooltip to original place
        restoreTipToBody();
      }
    });

    // Also handle the case when button uses class-based pseudo-FS
    var mo = new MutationObserver(function(){
      var cont = getCont();
      if (!cont) return;
      if (cont.classList.contains('is-fullscreen-power')){
        moveTipIntoContainer();
      } else {
        restoreTipToBody();
      }
    });
    mo.observe(document.body, { attributes: true, subtree: true, attributeFilter: ['class'] });

    // Initial small sync
    setTimeout(function(){
      // If already in FS at load time (unlikely), ensure it's inside
      var cont = getCont();
      if (cont && (document.fullscreenElement === cont || cont.classList.contains('is-fullscreen-power'))){
        moveTipIntoContainer();
      }
    }, 0);
  });
})();
</script>


<script>
(function(){
  function addZoomControls(){
    var bar = document.querySelector('.topbar .toolbar');
    if (!bar || document.getElementById('zoomMinus')) return;
    var wrap = document.createElement('div');
    wrap.className = 'zoom-controls';
    wrap.innerHTML = '<button id="zoomMinus" title="تصغير (Ctrl -)">−</button>' +
                     '<span class="zoom-readout" id="zoomReadout">100%</span>' +
                     '<button id="zoomPlus" title="تكبير (Ctrl +)">+</button>' +
                     '<button id="zoomReset" title="إعادة 100%">Reset</button>';
    bar.appendChild(wrap);
  }

  var Z_MIN = 0.7, Z_MAX = 1.6, STEP = 0.1;
  function clamp(v){ return Math.min(Z_MAX, Math.max(Z_MIN, v)); }

  function applyZoom(z){
    z = clamp(z);
    var root = document.documentElement;
    var supportsZoom = (typeof CSS !== 'undefined' && CSS.supports && CSS.supports('zoom', '1'));
    if (supportsZoom){
      root.style.zoom = z;
      document.body.removeAttribute('data-zoom-fallback');
    }else{
      root.style.zoom = '';
      document.body.setAttribute('data-zoom-fallback','1');
      root.style.setProperty('--ui-zoom', String(z));
    }
    try { localStorage.setItem('uiZoom', String(z)); } catch(e){}
    var r = document.getElementById('zoomReadout');
    if (r) r.textContent = Math.round(z*100) + '%';
    // Re-measure & redraw charts
    setTimeout(function(){
      try{ if (typeof window.updateChart === 'function') window.updateChart(); }catch(e){}
      window.dispatchEvent(new Event('resize'));
    }, 50);
  }

  function getZoom(){ 
    var z = 1;
    try { z = parseFloat(localStorage.getItem('uiZoom') || '1'); } catch(e){ z = 1; }
    if (!isFinite(z)) z = 1; 
    return clamp(z);
  }

  function init(){
    addZoomControls();
    applyZoom(getZoom());
    var minus = document.getElementById('zoomMinus');
    var plus  = document.getElementById('zoomPlus');
    var reset = document.getElementById('zoomReset');
    if (minus) minus.onclick = function(){ applyZoom(getZoom() - STEP); };
    if (plus)  plus.onclick  = function(){ applyZoom(getZoom() + STEP); };
    if (reset) reset.onclick = function(){ applyZoom(1); };

    // Keyboard shortcuts: Ctrl/Cmd + '+' or '-' to zoom, '0' to reset
    document.addEventListener('keydown', function(e){
      if (!(e.ctrlKey || e.metaKey)) return;
      if (e.key === '+' || e.key === '='){ e.preventDefault(); applyZoom(getZoom() + STEP); }
      else if (e.key === '-' || e.key === '_'){ e.preventDefault(); applyZoom(getZoom() - STEP); }
      else if (e.key === '0'){ e.preventDefault(); applyZoom(1); }
    });
  }

  if (document.readyState !== 'loading') init();
  else document.addEventListener('DOMContentLoaded', init);
})();
</script>

<script>

  }

  var stopAlarmRowsByDevice = Object.create(null);
  var runningStopInfoMap = Object.create(null);

  function getRunningDeviceName(row){

  }

  }

  }
  function buildStopAlarmRows(rows){

          preferredAfterDelta = forward;

          fallbackDelta = forward;

  function getBaseMinutes(){

      var t = parseDateMs(data[i] && data[i].Date);

    }

        var dk2 = dayKey(row2.Date);

        var key2 = device2 + '||' + dk2;

      var rec2 = out[key];

    });
    return out;
  }
  function deviationForRow(row, dailyCache){
    if (getDeviationMode() === MODE_INTERVAL) return intervalDeviation(row);
    var key = String((row && row.Device) || '') + '||' + dayKey(row && row.Date);
    return dailyCache[key] ? dailyCache[key].dev : NaN;
  }
  function formatDeviation(v){ return isFinite(v) ? v.toFixed(2) : ''; }
  function sortByDeviationEnabled(sortState){
    return !!(sortState && sortState.column && isDeviationEnabled() && (sortState.column === DEV_COL || sortState.column === 'Theoretical Power (kW)'));
  }
  function compareMaybeNaN(a, b, asc){
    var aBad = !isFinite(a), bBad = !isFinite(b);
    if (aBad && bBad) return 0;
    if (aBad) return 1;
    if (bBad) return -1;

  }
  function getSortedDataLikeOriginal(dailyCache){
    var data = getArray('displayData').slice();
    var sortState = tryEval('currentSort');
    if (sortByDeviationEnabled(sortState)) {
      var dc = dailyCache || buildDailyCache();

      return data;
    }
    if (sortState && sortState.column && sortState.column !== DEV_COL) {
      var col = sortState.column;
      data.sort(function(a, b) {
        var aval = a[col], bval = b[col];
        if (col === 'Date') {
          aval = new Date(String(a['Date']).replace(' ', 'T'));
          bval = new Date(String(b['Date']).replace(' ', 'T'));
          return sortState.asc ? aval - bval : bval - aval;
        }
        var numA = parseFloat(aval), numB = parseFloat(bval);
        if (!isNaN(numA) && !isNaN(numB)) return sortState.asc ? numA - numB : numB - numA;
        return sortState.asc ? String(aval).localeCompare(String(bval)) : String(bval).localeCompare(String(aval));
      });
    }
    return data;
  }
  function getHeaderColumns(includeDeviation){
    var headerRow = byId('tableHead') && byId('tableHead').querySelector('tr');
    if (!headerRow) return [];
    return Array.from(headerRow.children).map(function(th){
      return String(th.textContent || '').replace(/[▲▼]/g, '').trim();
    }).filter(function(name){ return includeDeviation ? !!name : !!name && name !== DEV_COL; });
  }
  function getCellText(row, col, dailyCache){
    if (col === DEV_COL) return formatDeviation(deviationForRow(row, dailyCache));
    if (col === 'Theoretical Power (kW)'){
      var th = theoreticalPower(row);
      return isFinite(th) ? (Math.round(th*1000)/1000).toString() : '';
    }
    return row && row[col] !== undefined ? row[col] : '';
  }
  function rerenderBodyWithRows(pageData, dailyCache){
    var tbody = byId('tableBody');
    if (!tbody) return;
    var cols = getHeaderColumns(false);
    tbody.innerHTML = '';
    for (var i=0; i<pageData.length; i++){
      var tr = document.createElement('tr');
      for (var j=0; j<cols.length; j++){
        var td = document.createElement('td');
        td.textContent = getCellText(pageData[i], cols[j], dailyCache);
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  }
  function appendDeviationColumn(){
    if (!isDeviationEnabled() || !canComputeDeviation()) return;
    var thead = byId('tableHead'), tbody = byId('tableBody');
    if (!thead || !tbody) return;
    var headerRow = thead.querySelector('tr');
    if (!headerRow) return;
    var dailyCache = buildDailyCache();
    var sorted = getSortedDataLikeOriginal(dailyCache);
    var page = tryEval('currentPage') || 1;
    var perPage = tryEval('rowsPerPage') || 200;
    var pageData = sorted.slice((page - 1) * perPage, (page - 1) * perPage + perPage);
    var sortState = tryEval('currentSort');
    if (sortByDeviationEnabled(sortState)) rerenderBodyWithRows(pageData, dailyCache);
    var th = headerRow.querySelector('th[data-dev-col="1"]');
    if (!th) {
      th = document.createElement('th');
      th.setAttribute('data-dev-col', '1');
      th.title = 'Deviation % = ((Actual - Theoretical) / Theoretical) × 100';
      th.style.cursor = 'pointer';
      th.addEventListener('click', function(){
        var cs = tryEval('currentSort');
        if (!cs) return;
        if (cs.column === DEV_COL) cs.asc = !cs.asc;
        else { cs.column = DEV_COL; cs.asc = true; }
        if (typeof currentPage !== 'undefined') currentPage = 1;
        if (typeof buildTable === 'function') buildTable();
      });
      headerRow.appendChild(th);
    }
    th.textContent = DEV_COL + ((sortState && sortState.column === DEV_COL) ? (sortState.asc ? ' ▲' : ' ▼') : '');
    var domRows = Array.from(tbody.querySelectorAll('tr'));
    for (var i=0; i<domRows.length; i++){
      var existing = domRows[i].querySelector('td[data-dev-col="1"]');
      if (!existing) {
        existing = document.createElement('td');
        existing.setAttribute('data-dev-col', '1');
        domRows[i].appendChild(existing);
      }
      existing.textContent = formatDeviation(deviationForRow(pageData[i], dailyCache));
    }
  }
  function updateHelpText(){
    var help = byId('deviationHelpText');
    var wrap = byId('deviationModeWrap');
    if (wrap) wrap.style.display = isDeviationEnabled() ? '' : 'none';
    if (help) {
      if (getDeviationMode() === MODE_DAILY) {
        help.textContent = hasRunningSource()
          ? 'Daily mode uses Excel-like RUNNING matching: X-Minutal rows where time > running start and time <= running end, with the power curve rounded down to 0.1 m/s before applying ((ΣActual - ΣTheoretical) / ΣTheoretical) × 100.'
          : 'Daily mode uses visible X-Minutal rows only. Load Full AWS for the Excel-style RUNNING matching.';
      } else {
        help.textContent = hasRunningSource() ? 'Per displayed interval uses visible X‑Minutal rows that overlap RUNNING windows from Full AWS: ((Actual - Theoretical) / Theoretical) × 100.' : 'Per displayed interval uses each visible X‑Minutal row. Load Full AWS to limit it to RUNNING windows only.';
      }
    }
    updateRunningStatusText('');
  }
  function injectAwsControl(){
    if (byId('runningStatusSection')) return;
    var upload = byId('csvInput');
    if (!upload) return;
    var section = upload.closest('.section');
    if (!section || !section.parentNode) return;
