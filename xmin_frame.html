    box.id = 'runningStatusSection';
    box.innerHTML = '<label for="awsInput">Upload Running Status CSV (Full AWS)</label>' +
      '<input type="file" id="awsInput" accept=".csv">' +
      '<div id="runningStatusText" class="status"></div>';
    section.parentNode.insertBefore(box, section.nextSibling);
    updateRunningStatusText('');
  }

  function injectControls(){
    if (byId('deviationOptionsSection')) return;
    var interval = byId('intervalSelect');
    if (!interval) return;
    var section = interval.closest('.section');
    if (!section || !section.parentNode) return;
    var box = document.createElement('div');
    box.className = 'section';
    box.id = 'deviationOptionsSection';
    box.innerHTML = '<label>Deviation % Options</label>' +
      '<div class="dev-row"><input type="checkbox" id="toggleDeviationExcel" checked>' +
      '<label for="toggleDeviationExcel" style="margin:0;cursor:pointer;">Show Deviation %</label></div>' +
      '<div id="deviationModeWrap"><label for="deviationModeSelect" style="margin-top:8px;">Deviation calculation mode</label>' +
      '<select id="deviationModeSelect"><option value="daily" selected>Daily</option><option value="interval">Per displayed interval</option></select>' +
      '<div class="dev-note" id="deviationHelpText"></div></div>';
    section.parentNode.insertBefore(box, section.nextSibling);
    updateHelpText();
  }
  function patchBuildTable(){
    if (typeof buildTable !== 'function' || buildTable.__deviationPatched) return;
    var originalBuildTable = buildTable;
    var patched = function(){
      var result = originalBuildTable.apply(this, arguments);
      try { appendDeviationColumn(); } catch(e){ console.error('Deviation patch error:', e); }
      return result;
    };
    patched.__deviationPatched = true;
    buildTable = patched;
    window.buildTable = patched;
  }
  function bindControls(){
    var toggle = byId('toggleDeviationExcel');
    var mode = byId('deviationModeSelect');
    if (toggle && !toggle.__bound){ toggle.addEventListener('change', function(){ updateHelpText(); if (typeof buildTable === 'function') buildTable(); }); toggle.__bound = true; }
    if (mode && !mode.__bound){ mode.addEventListener('change', function(){ updateHelpText(); if (typeof buildTable === 'function') buildTable(); }); mode.__bound = true; }
    bindAwsUpload();
  }
  function init(){
    injectAwsControl();
    injectControls();
    patchBuildTable();
    bindControls();
    updateHelpText();
    try { if (typeof buildTable === 'function') buildTable(); } catch(e){}
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>


<script id="exceed-fast-scan">
(function(){
  if (window.__exceed_fast_scan__) return;
  window.__exceed_fast_scan__ = true;

  const LIMITS = [
    {re:/\bBearing\s+D\.?E\.?\s+Temperature\b.*10\s*M/i, limit:95},
    {re:/\bBearing\s+N\.?D\.?E\.?\s+Temperature\b.*10\s*M/i, limit:95},
    {re:/\bGearbox\b.*bearing\s+temperature\b.*10\s*M/i, limit:88},
    {re:/\bGearbox\b.*oil\s+temperature\b.*10\s*M/i, limit:75},
    {re:/\bGenerator\b.*windings\s+temperature\s*1\b.*10\s*M/i, limit:150},
    {re:/\bGenerator\b.*windings\s+temperature\s*2\b.*10\s*M/i, limit:150},
    {re:/\bGenerator\b.*windings\s+temperature\s*3\b.*10\s*M/i, limit:150},
    {re:/\bGenerator\b.*sliprings\s+temperature\b.*10\s*M/i, limit:75},
    {re:/\bTrafo\s*1\b.*winding\s+temperature\b.*10\s*M/i, limit:140},
    {re:/\bTrafo\s*2\b.*winding\s+temperature\b.*10\s*M/i, limit:140},
    {re:/\bTrafo\s*3\b.*winding\s+temperature\b.*10\s*M/i, limit:140}
  ];

  function byId(id){ return document.getElementById(id); }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; }); }
  function tryEval(name){ try { return eval(name); } catch(e){ return undefined; } }
  function firstArray(candidates){
    for (var i=0;i<candidates.length;i++){
      var v = tryEval(candidates[i]);
      if (Array.isArray(v) && v.length) return v;
      v = window[candidates[i]];
      if (Array.isArray(v) && v.length) return v;
    }
    return [];
  }
  function toNumber(v){
    if (v == null || v === '') return NaN;
    if (typeof v === 'number') return isFinite(v) ? v : NaN;
    let s = String(v).trim();
    if (!s) return NaN;
    const commas = (s.match(/,/g) || []).length;
    const dots = (s.match(/\./g) || []).length;
    if (commas > dots) s = s.replace(/\./g, '').replace(/,/g, '.');
    else s = s.replace(/,/g, '');
    const n = Number(s);
    return isFinite(n) ? n : NaN;
  }
  function getData(){
    var rows = firstArray(['filteredData','rawData','fullData','allData','originalData','masterData','dataset','data','_allRows','__all']);
    if (rows.length) return rows;
    var table = byId('dataTable') || document.querySelector('table');
    if (!table || !table.tBodies || !table.tBodies[0]) return [];
    var headRow = table.tHead && table.tHead.rows && table.tHead.rows.length ? table.tHead.rows[0] : null;
    if (!headRow || !headRow.cells || !headRow.cells.length) {
      headRow = table.querySelector('thead tr');
    }
    if (!headRow || !headRow.cells || !headRow.cells.length) return [];
    var headers = Array.from(headRow.cells || []).map(function(th){ return String(th.textContent || '').trim(); });
    return Array.from(table.tBodies[0].rows || []).map(function(tr){
      var obj = {};
      Array.from(tr && tr.cells ? tr.cells : []).forEach(function(td, idx){ obj[headers[idx] || ('C'+idx)] = String(td.textContent || '').trim(); });
      return obj;
    });
  }
  function getKeys(rows){
    if (!rows.length) return [];
    const vars = firstArray(['variableNames']);
    const names = vars.length
      ? vars.slice()
      : Object.keys(rows[0] || {}).filter(function(k){ return k !== 'Device' && k !== 'Date'; });
    const out = [];
    names.forEach(function(name){
      for (let i=0;i<LIMITS.length;i++){
        if (LIMITS[i].re.test(String(name))){
          out.push({key:name, limit:LIMITS[i].limit});
          break;
        }
      }
    });
    return out;
  }
  function compute(){
    const rows = getData();
    const keys = getKeys(rows);
    if (!rows.length || !keys.length) return [];
    const out = [];
    for (let i=0;i<rows.length;i++){
      const row = rows[i] || {};
      const device = row['Device'] || '';
      const date = row['Date'] || '';
      for (let j=0;j<keys.length;j++){
        const item = keys[j];
        const val = toNumber(row[item.key]);
        if (isFinite(val) && val > item.limit){
          out.push({
            device: String(device),
            variable: String(item.key),
            date: String(date),
            value: val,
            limit: item.limit
          });
        }
      }
    }
    return out;
  }
  function ensureWrap(){
    let wrap = byId('exceedWrap');
    if (!wrap){
      wrap = document.createElement('section');
      wrap.id = 'exceedWrap';
      wrap.innerHTML =
        '<header><h3>Exceedances analysis</h3><div class="actions">' +
        '<input id="exceedSearchFast" type="search" placeholder="Search turbine..." style="padding:6px 8px;border:1px solid #d1d5db;border-radius:8px;margin-right:8px;">' +
        '<button id="exceedRefreshBtn">Refresh</button>' +
        '<button id="exceedCsvBtn">Download CSV</button>' +
        '</div></header>' +
        '<div class="inner"><div class="empty">No exceedances found.</div></div>';
      (byId('main') || document.body).appendChild(wrap);
    }
    return wrap;
  }
  function render(rows){
    const wrap = ensureWrap();
    const inner = wrap.querySelector('.inner');
    const search = byId('exceedSearchFast');
    const q = search ? search.value.trim().toLowerCase() : '';
    const filtered = q ? rows.filter(function(r){ return String(r.device).toLowerCase().indexOf(q) !== -1; }) : rows;
    if (!filtered.length){
      inner.innerHTML = '<div class="empty">No exceedances found.</div>';
    } else {
      let html = '<div style="margin-bottom:8px;font-size:12px;color:#475569;">Found <strong>' + filtered.length + '</strong> exceedance(s)' + (q ? ' after search filter' : '') + '.</div>';
      html += '<div style="max-height:340px; overflow:auto;"><table id="exceedTable"><thead><tr><th>Device</th><th>Variable</th><th>Date & Time</th><th style="text-align:right">Value</th><th style="text-align:right">Limit</th></tr></thead><tbody>';
      for (let i=0;i<filtered.length;i++){
        const r = filtered[i];
        html += '<tr><td>' + esc(r.device) + '</td><td>' + esc(r.variable) + '</td><td>' + esc(r.date) + '</td><td class="v">' + esc(r.value) + '</td><td class="v">' + esc(r.limit) + '</td></tr>';
      }
      html += '</tbody></table></div>';
      inner.innerHTML = html;
    }
    const btn = byId('exceedCsvBtn');
    if (btn){
      btn.onclick = function(){
        const data = [['Device','Variable','Date & Time','Value','Limit']].concat(filtered.map(function(r){ return [r.device, r.variable, r.date, r.value, r.limit]; }));
        const csv = data.map(function(arr){ return arr.map(function(x){ return '"' + String(x).replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
        const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'exceedances.csv';
        a.click();
        setTimeout(function(){ URL.revokeObjectURL(url); }, 0);
      };
    }
  }
  let timer = null;
  function rebuild(){
    try {
      window.__fastExceedRows = compute();
      render(window.__fastExceedRows);
    } catch (e) {
      console.warn('Fast exceed scan skipped:', e && e.message ? e.message : e);
    }
  }
  function schedule(ms){
    clearTimeout(timer);
    timer = setTimeout(rebuild, ms == null ? 80 : ms);
  }

  document.addEventListener('click', function(e){
    const btn = e.target && e.target.closest ? e.target.closest('#exceedRefreshBtn') : null;
    if (btn){ e.preventDefault(); rebuild(); }
  }, true);

  document.addEventListener('input', function(e){
    if (e.target && e.target.id === 'exceedSearchFast'){
      render(window.__fastExceedRows || []);
    }
  }, true);

  document.addEventListener('change', function(e){
    const el = e.target;
    if (el && el.tagName === 'INPUT' && (el.type || '').toLowerCase() === 'file'){
      schedule(120);
    }
  }, true);

  if (typeof window.buildTable === 'function' && !window.buildTable.__fastExceedPatched){
    const _buildTable = window.buildTable;
    window.buildTable = function(){
      const r = _buildTable.apply(this, arguments);
      schedule(0);
      return r;
    };
    window.buildTable.__fastExceedPatched = true;
  }
  if (typeof window.applyFilters === 'function' && !window.applyFilters.__fastExceedPatched){
    const _applyFilters = window.applyFilters;
    window.applyFilters = function(){
      const r = _applyFilters.apply(this, arguments);
      schedule(0);
      return r;
    };
    window.applyFilters.__fastExceedPatched = true;
  }
  if (typeof window.updateAggregatedData === 'function' && !window.updateAggregatedData.__fastExceedPatched){
    const _update = window.updateAggregatedData;
    window.updateAggregatedData = function(){
      const r = _update.apply(this, arguments);
      schedule(0);
      return r;
    };
    window.updateAggregatedData.__fastExceedPatched = true;
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ ensureWrap(); schedule(0); });
  } else {
    ensureWrap();
    schedule(0);
  }
  window.addEventListener('load', function(){ schedule(0); });

  window.refreshExceedances = rebuild;
})();
</script>


<script id="exceed-autoload-fix">
(function(){
  if (window.__exceed_autoload_fix__) return;
  window.__exceed_autoload_fix__ = true;

  let debounceTimer = null;
  let settleTimer = null;
  let observer = null;

  function byId(id){ return document.getElementById(id); }

  function triggerNow(){
    try {
      if (typeof window.refreshExceedances === 'function') window.refreshExceedances();
    } catch (e) {
      console.error('Exceed autoload refresh failed:', e);
    }
  }

  function schedule(ms){
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(triggerNow, ms == null ? 80 : ms);
  }

  function scheduleSettled(){
    clearTimeout(settleTimer);
    let tries = 0;
    let stable = 0;
    let lastSig = '';
    function snap(){
      const rawLen = Array.isArray(window.rawData) ? window.rawData.length : 0;
      const filtLen = Array.isArray(window.filteredData) ? window.filteredData.length : 0;
      const dispLen = Array.isArray(window.displayData) ? window.displayData.length : 0;
      const tbody = byId('tableBody');
      const thead = byId('tableHead');
      const rowLen = tbody ? tbody.children.length : 0;
      const headLen = thead ? thead.textContent.length : 0;
      const sig = [rawLen, filtLen, dispLen, rowLen, headLen].join('|');
      if (sig === lastSig && sig !== '0|0|0|0|0') stable += 1;
      else { stable = 0; lastSig = sig; }
      triggerNow();
      tries += 1;
      if (stable < 2 && tries < 25) settleTimer = setTimeout(snap, 180);
    }
    settleTimer = setTimeout(snap, 60);
  }

  function watchTable(){
    const tbody = byId('tableBody');
    const thead = byId('tableHead');
    const target = tbody || thead;
    if (!target || target.__exceedObserved) return;
    target.__exceedObserved = true;
    observer = new MutationObserver(function(){
      schedule(40);
      scheduleSettled();
    });
    observer.observe(target, { childList:true, subtree:true, characterData:true });
    if (thead && thead !== target){
      observer.observe(thead, { childList:true, subtree:true, characterData:true });
    }
  }

  function bindInputs(){
    ['csvInput','awsInput'].forEach(function(id){
      const el = byId(id);
      if (!el || el.__exceedAutoBound) return;
      el.__exceedAutoBound = true;
      el.addEventListener('change', function(){
        schedule(80);
        scheduleSettled();
        setTimeout(triggerNow, 500);
        setTimeout(triggerNow, 1200);
        setTimeout(triggerNow, 2500);
      }, true);
    });
  }

  function patchBuildTable(){
    if (typeof window.buildTable !== 'function' || window.buildTable.__exceedAutoPatched) return;
    const old = window.buildTable;
    const wrapped = function(){
      const r = old.apply(this, arguments);
      watchTable();
      schedule(0);
      scheduleSettled();
      return r;
    };
    wrapped.__exceedAutoPatched = true;
    window.buildTable = wrapped;
    try { buildTable = wrapped; } catch(e) {}
  }

  function init(){
    bindInputs();
    watchTable();
    patchBuildTable();
    schedule(0);
    scheduleSettled();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  window.addEventListener('load', function(){ bindInputs(); watchTable(); scheduleSettled(); });
})();
</script>

<script id="deviation-ranking-script">
(function(){
  if (window.__deviation_ranking__) return;
  window.__deviation_ranking__ = true;

  function byId(id){ return document.getElementById(id); }
  function tryEval(name){ try { return eval(name); } catch(e){ return undefined; } }
  function getArray(name){ var v = tryEval(name); return Array.isArray(v) ? v : []; }
  function parseNum(v){ var n = parseFloat(v); return isFinite(n) ? n : NaN; }
  function round2(v){ return Math.round(v * 100) / 100; }
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; }); }
  function getVarName(token){
    var vars = getArray('variableNames');
    token = String(token || '').toLowerCase();
    for (var i=0;i<vars.length;i++) if (String(vars[i]).toLowerCase().indexOf(token) !== -1) return vars[i];
    return '';
  }
  function getAAPVarName(){ return getVarName('average active power'); }
  function getWSVarName(){ return getVarName('average wind speed'); }
  function getTempVarName(){ return getVarName('average ambient temperature'); }
  function getDeviationMode(){ var el = byId('deviationModeSelect'); return el && el.value === 'interval' ? 'interval' : 'daily'; }
  function hasRunningSource(){ var m = window.__runningIntervalMap || {}; return !!Object.keys(m).length; }
  function getBaseMinutes(){ return parseFloat(tryEval('baseMinutes')) || 10; }
  function parseDateMs(s){
    if (!s) return NaN;
    var txt = String(s).trim().replace('T', ' ');
    var parts = txt.split(' ');
    if (!parts[0]) return NaN;
    var d = parts[0].split(/[\/\-]/);
    var t = (parts[1] || '00:00:00').split(':');
    if (d.length < 3) return NaN;
    var secRaw = String(t[2] || '0').replace(',', '.');
    var sec = parseFloat(secRaw); if (!isFinite(sec)) sec = 0;
    var secInt = Math.floor(sec), ms = Math.round((sec - secInt) * 1000);
    return new Date(parseInt(d[0],10), parseInt(d[1],10)-1, parseInt(d[2],10), parseInt(t[0],10)||0, parseInt(t[1],10)||0, secInt, ms).getTime();
  }
  function expectedPowerKWFromWSTempExcel(ws, temp){
    var pc = window.POWER_CURVE || [];
    if (!pc.length || !isFinite(ws)) return NaN;
    var wsFloor = Math.floor(ws * 10) / 10;
    var p1 = NaN;
    for (var i = 0; i < pc.length; i++) {
      if (Math.abs(pc[i].ws - wsFloor) < 1e-9) { p1 = pc[i].kw; break; }
    }
    if (!isFinite(p1) && typeof window.expectedPowerKWFromWS === 'function') p1 = window.expectedPowerKWFromWS(wsFloor);
    if (!isFinite(p1)) return NaN;
    if (isFinite(temp) && temp > 35) {
      var p2 = Math.max(0, 5950 - 110 * temp);
      p1 = Math.min(p1, p2);
    }
    return p1;
  }
  function theoreticalPower(row, excelMode){
    if (!row) return NaN;
    var wsName = getWSVarName();
    if (!wsName) return NaN;
    var tempName = getTempVarName();
    var ws = parseNum(row[wsName]);
    var temp = tempName ? parseNum(row[tempName]) : NaN;
    if (!isFinite(ws)) return NaN;
    if (excelMode) return expectedPowerKWFromWSTempExcel(ws, temp);
    if (typeof window.expectedPowerKWFromWSTemp === 'function') return window.expectedPowerKWFromWSTemp(ws, temp);
    return NaN;
  }
  function isDeviationPossible(){ return !!(getAAPVarName() && getWSVarName()); }
  function collectDeviceStats(){
    var data = getArray('filteredData');
    var aap = getAAPVarName();
    var out = Object.create(null);
    if (!data.length || !aap || !isDeviationPossible()) return out;
    var mode = getDeviationMode();
    if (mode === 'daily' && hasRunningSource()) {
      var byDevice = Object.create(null);
      for (var i=0; i<data.length; i++){
        var row = data[i] || {};
        var device = String(row.Device || '').trim();
        var ms = parseDateMs(row.Date);
        if (!device || !isFinite(ms)) continue;
        if (!byDevice[device]) byDevice[device] = [];
        byDevice[device].push({ms: ms, act: parseNum(row[aap]), theo: theoreticalPower(row, true)});
      }
      Object.keys(byDevice).forEach(function(device){
        var rows = byDevice[device];
        rows.sort(function(a,b){ return a.ms - b.ms; });
        var segs = (window.__runningRawMap && window.__runningRawMap[device]) || (window.__runningIntervalMap && window.__runningIntervalMap[device]) || [];
        if (!segs.length) return;
        var idx = 0;
        for (var s=0; s<segs.length; s++){
          var segStart = segs[s][0], segEnd = segs[s][1];
          while (idx < rows.length && rows[idx].ms <= segStart) idx++;
          var j = idx;
          while (j < rows.length && rows[j].ms <= segEnd){
            var rec = rows[j];
            if (!out[device]) out[device] = {device: device, act: 0, theo: 0};
            if (isFinite(rec.act)) out[device].act += rec.act / 6000;
            if (isFinite(rec.theo)) out[device].theo += rec.theo / 6000;
            j++;
          }
          idx = j;
        }
      });
    } else {
      var factor = getBaseMinutes() / 60 / 1000;
      for (var k=0; k<data.length; k++){
        var row2 = data[k] || {};
        var device2 = String(row2.Device || '').trim();
        if (!device2) continue;
        if (!out[device2]) out[device2] = {device: device2, act: 0, theo: 0};
        var actual = parseNum(row2[aap]);
        var theo = theoreticalPower(row2, mode === 'daily');
        if (isFinite(actual)) out[device2].act += actual * factor;
        if (isFinite(theo)) out[device2].theo += theo * factor;
      }
    }
    Object.keys(out).forEach(function(device){
      var rec = out[device];
      rec.dev = (rec.theo && isFinite(rec.theo)) ? round2(((rec.act - rec.theo) / rec.theo) * 100) : NaN;
    });
    return out;
  }
  function badgeClass(v){ if (!isFinite(v)) return 'neutral'; if (v < 0) return 'negative'; if (v > 0) return 'positive'; return 'neutral'; }
  function formatDev(v){ return isFinite(v) ? v.toFixed(2) + '%' : '—'; }
  function formatEnergy(v){ return isFinite(v) ? v.toFixed(3) : '—'; }
  function rowsHtml(rows){
    if (!rows.length) return '<div class="empty">No turbine deviation data available for the current filters.</div>';
    var html = '<table><thead><tr><th class="rank">#</th><th>Turbine</th><th class="num">Deviation %</th><th class="num">Actual MWh</th><th class="num">Theoretical MWh</th></tr></thead><tbody>';
    for (var i=0; i<rows.length; i++){
      var r = rows[i];
      html += '<tr>' +
        '<td class="rank">' + (i+1) + '</td>' +
        '<td class="device">' + esc(r.device) + '</td>' +
        '<td class="num"><span class="badge ' + badgeClass(r.dev) + '">' + esc(formatDev(r.dev)) + '</span></td>' +
        '<td class="num">' + esc(formatEnergy(r.act)) + '</td>' +
        '<td class="num">' + esc(formatEnergy(r.theo)) + '</td>' +
      '</tr>';
    }
    html += '</tbody></table>';
    return html;
  }
  function ensureSection(){
    if (byId('deviationRankingWrap')) return byId('deviationRankingWrap');
    var anchor = byId('exceedWrap');
    if (!anchor || !anchor.parentNode) return null;
    var sec = document.createElement('section');
    sec.id = 'deviationRankingWrap';
    sec.innerHTML = '<header><div><h3>Deviation ranking summary</h3><div class="sub" id="deviationRankingSub">Top and bottom 10 turbines by deviation for the current filters.</div></div></header><div class="inner"><div class="grid"><div class="card"><div class="card-head">Bottom 10 lowest deviation</div><div class="card-body" id="topDeviationBody"></div></div><div class="card"><div class="card-head">Top 10 highest deviation</div><div class="card-body" id="bottomDeviationBody"></div></div></div></div>';
    anchor.parentNode.insertBefore(sec, anchor);
    return sec;
  }
  function renderSummary(){
    var sec = ensureSection();
    if (!sec) return;
    var sub = byId('deviationRankingSub');
    var topBody = byId('topDeviationBody');
    var bottomBody = byId('bottomDeviationBody');
    if (!topBody || !bottomBody) return;
    if (!isDeviationPossible()) {
      if (sub) sub.textContent = 'Load X-Minutal data with wind speed and active power to generate deviation ranking.';
      topBody.innerHTML = '<div class="empty">Deviation ranking is not available yet.</div>';
      bottomBody.innerHTML = '<div class="empty">Deviation ranking is not available yet.</div>';
      return;
    }
    var statsMap = collectDeviceStats();
    var rows = Object.keys(statsMap).map(function(k){ return statsMap[k]; }).filter(function(r){ return isFinite(r.dev); });
    if (sub) sub.textContent = 'Based on the current filters and deviation mode: ' + (getDeviationMode() === 'daily' ? 'Daily' : 'Per displayed interval') + '.';
    if (!rows.length) {
      topBody.innerHTML = '<div class="empty">No turbine deviation data available for the current filters.</div>';
      bottomBody.innerHTML = '<div class="empty">No turbine deviation data available for the current filters.</div>';
      return;
    }
    var high = rows.slice().sort(function(a,b){ return b.dev - a.dev || String(a.device).localeCompare(String(b.device)); }).slice(0, 10);
    var low = rows.slice().sort(function(a,b){ return a.dev - b.dev || String(a.device).localeCompare(String(b.device)); }).slice(0, 10);
    topBody.innerHTML = rowsHtml(high);
    bottomBody.innerHTML = rowsHtml(low);
  }
  function patchBuildTable(){
    if (typeof buildTable !== 'function' || buildTable.__devRankingPatched) return;
    var original = buildTable;
    var patched = function(){
      var result = original.apply(this, arguments);
      try { renderSummary(); } catch(e) { console.error('Deviation ranking error:', e); }
      return result;
    };
    patched.__devRankingPatched = true;
    buildTable = patched;
    window.buildTable = patched;
  }
  function bind(){
    ['toggleDeviationExcel','deviationModeSelect','awsInput'].forEach(function(id){
      var el = byId(id);
      if (el && !el.__devRankBound){ el.addEventListener('change', function(){ setTimeout(renderSummary, 0); }); el.__devRankBound = true; }
    });
  }
  function init(){
    ensureSection();
    patchBuildTable();
    bind();
    try { renderSummary(); } catch(e) {}
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>

<script id="multi-turbine-chart-patch">
(function(){
  function getSelectedTurbines(){
    try { return (typeof selectedTurbines !== 'undefined') ? selectedTurbines : (window.selectedTurbines || new Set()); }
    catch(e){ return window.selectedTurbines || new Set(); }
  }
  function getSelectedVars(){
    try { return (typeof selectedVars !== 'undefined') ? selectedVars : (window.selectedVars || new Set()); }
    catch(e){ return window.selectedVars || new Set(); }
  }
  function getVariableNames(){
    try { return (typeof variableNames !== 'undefined') ? variableNames : (window.variableNames || []); }
    catch(e){ return window.variableNames || []; }
  }
  function getDisplayData(){
    try { return (typeof displayData !== 'undefined') ? displayData : (window.displayData || []); }
    catch(e){ return window.displayData || []; }
  }
  function isAAPVar(v){
    try {
      if (typeof isAAP === 'function') return isAAP(v);
      if (typeof window.isAAP === 'function') return window.isAAP(v);
    } catch(e){}
    return String(v || '').toLowerCase().includes('average active power');
  }
  function lineColor(idx, total){
    try {
      if (typeof darkColor === 'function') return darkColor(idx, total);
      if (typeof window.darkColor === 'function') return window.darkColor(idx, total);
    } catch(e){}
    var palette = ['#2563eb','#dc2626','#16a34a','#9333ea','#ea580c','#0891b2','#e11d48','#4f46e5'];
    return palette[idx % palette.length];
  }
  function ensureMultiContainer(){
    var existing = document.getElementById('multiTurbineCharts');
    if (existing) return existing;
    var anchor = document.getElementById('powerChartContainer') || document.getElementById('chartContainer');
    if (!anchor || !anchor.parentNode) return null;
    var div = document.createElement('div');
    div.id = 'multiTurbineCharts';
    anchor.parentNode.insertBefore(div, anchor.nextSibling);
    return div;
  }

  function parseDateValue(s){
    if (!s) return NaN;
    var d = new Date(String(s).replace(' ', 'T'));
    if (!isNaN(d.getTime())) return d.getTime();
    d = new Date(s);
    return d.getTime();
  }

  function sortDates(list){
    return list.slice().sort(function(a,b){ return parseDateValue(a) - parseDateValue(b); });
  }

  function shortDateLabel(s){
    if (!s) return '';
    var str = String(s);
    var parts = str.split(' ');
    if (parts.length >= 2) return parts[1].slice(0,5);
    return str;
  }

  function getRowMap(rows){
    var map = new Map();
    for (var i=0; i<rows.length; i++){
      var row = rows[i];
      map.set(row['Date'], row);
    }
    return map;
  }

  function getSeriesYRange(seriesArr){
    var yMin = Infinity, yMax = -Infinity;
    seriesArr.forEach(function(series){
      (series.values || []).forEach(function(v){
        if (v == null || !isFinite(v)) return;
        if (v < yMin) yMin = v;
        if (v > yMax) yMax = v;
      });
    });
    if (!isFinite(yMin) || !isFinite(yMax)) return null;
    if (yMin === yMax){
      yMin -= 1;
      yMax += 1;
    } else {
      var pad = (yMax - yMin) * 0.1;
      yMin -= pad;
      yMax += pad;
    }
    return { yMin:yMin, yMax:yMax };
  }

  function drawLineChart(canvas, dates, seriesArr){
    if (!canvas || !dates || !dates.length || !seriesArr || !seriesArr.length) return;
    var rect = canvas.getBoundingClientRect();
    var width = Math.max(300, Math.floor(rect.width || canvas.clientWidth || 900));
    var height = Math.max(220, Math.floor(rect.height || 320));
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);

    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, width, height);

    var leftPad = 60, rightPad = 20, topPad = 36, bottomPad = 48;
    var chartW = Math.max(60, width - leftPad - rightPad);
    var chartH = Math.max(60, height - topPad - bottomPad);
    var xStep = chartW / Math.max(1, dates.length - 1);
    var yr = getSeriesYRange(seriesArr);
    if (!yr) {
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
      ctx.font = '13px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('No valid data to plot', width / 2, height / 2);
      return;
    }
    var yMin = yr.yMin, yMax = yr.yMax;
    var yDenom = (yMax - yMin) || 1;

    function toY(v){
      return topPad + chartH - ((v - yMin) / yDenom) * chartH;
    }

    function drawDeviationFill(actualSeries, theoreticalSeries){
      if (!actualSeries || !theoreticalSeries) return;
      var valsA = Array.isArray(actualSeries.values) ? actualSeries.values : [];
      var valsT = Array.isArray(theoreticalSeries.values) ? theoreticalSeries.values : [];
      var len = Math.min(valsA.length, valsT.length);
      if (len < 2) return;

      function signOf(diff){
        return diff > 0 ? 1 : (diff < 0 ? -1 : 0);
      }
      function fillQuad(x0, yA0, yT0, x1, yA1, yT1, sign) {
        if (sign == null || !isFinite(sign)) return;
        ctx.beginPath();
        ctx.moveTo(x0, yA0); ctx.lineTo(x1, yA1); ctx.lineTo(x1, yT1); ctx.lineTo(x0, yT0);
        ctx.closePath();
        ctx.fillStyle = sign > 0 ? 'rgba(34, 197, 94, 0.18)' : (sign < 0 ? 'rgba(239, 68, 68, 0.18)' : 'rgba(148, 163, 184, 0.12)');
        ctx.fill();
      }

      ctx.save();
      ctx.beginPath();
      ctx.rect(leftPad, topPad, chartW, chartH);
      ctx.clip();

      for (var i = 1; i < len; i++){
        var a0 = valsA[i - 1], a1 = valsA[i];
        var t0 = valsT[i - 1], t1 = valsT[i];
        if (![a0, a1, t0, t1].every(function(v){ return v != null && isFinite(v); })) continue;

        var x0 = leftPad + (i - 1) * xStep;
        var x1 = leftPad + i * xStep;
        var yA0 = toY(a0), yA1 = toY(a1), yT0 = toY(t0), yT1 = toY(t1);

        var d0 = a0 - t0;
        var d1 = a1 - t1;
        var pct0 = (t0 != null && isFinite(t0) && Math.abs(t0) > 1e-9) ? Math.abs((t0 - a0) / t0) * 100 : null;
        var pct1 = (t1 != null && isFinite(t1) && Math.abs(t1) > 1e-9) ? Math.abs((t1 - a1) / t1) * 100 : null;
        var s0 = signOf(d0);
        var s1 = signOf(d1);

        if (s0 === 0 && s1 === 0) continue;
        if (s0 === 0) s0 = s1;
        if (s1 === 0) s1 = s0;

        if (s0 === s1){
          fillQuad(x0, yA0, yT0, x1, yA1, yT1, s0);
          continue;
        }

        var frac = (d0 - d1) !== 0 ? (d0 / (d0 - d1)) : 0.5;
        var xc = x0 + (x1 - x0) * frac;
        var yCross = yA0 + (yA1 - yA0) * frac;

        fillQuad(x0, yA0, yT0, xc, yCross, yCross, s0);
        fillQuad(xc, yCross, yCross, x1, yA1, yT1, s1);
      }

      ctx.restore();
    }

    // Legend
    var lx = leftPad;
    var ly = 16;
    ctx.font = '12px Arial';
    ctx.textBaseline = 'middle';
    seriesArr.forEach(function(series){
      ctx.strokeStyle = series.color || '#2563eb';
      ctx.lineWidth = 2.5;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + 16, ly);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
      ctx.textAlign = 'left';
      var label = series.label || series.var || '';
      ctx.fillText(label, lx + 22, ly);
      lx += Math.min(260, 34 + ctx.measureText(label).width);
    });

    // Grid and ticks
    ctx.strokeStyle = 'rgba(120,130,150,0.25)';
    ctx.lineWidth = 1;
    var yTicks = 5;
    ctx.font = '12px Arial';
    for (var i=0; i<=yTicks; i++){
      var t = i / yTicks;
      var y = topPad + chartH - t * chartH;
      var val = (yMin + t * (yMax - yMin)).toFixed(2);
      ctx.beginPath();
      ctx.moveTo(leftPad, y);
      ctx.lineTo(leftPad + chartW, y);
      ctx.stroke();
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(val, leftPad - 6, y);
    }

    // Axes
    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(leftPad, topPad);
    ctx.lineTo(leftPad, topPad + chartH);
    ctx.lineTo(leftPad + chartW, topPad + chartH);
    ctx.stroke();

    // X labels
    var labelCount = Math.min(8, dates.length);
    var skip = Math.max(1, Math.ceil(dates.length / labelCount));
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (var j=0; j<dates.length; j+=skip){
      var x = leftPad + j * xStep;
      ctx.fillText(shortDateLabel(dates[j]), x, topPad + chartH + 8);
    }

    var theoreticalSeries = null;
    var actualSeries = null;
    seriesArr.forEach(function(series){
      var label = String(series.label || series.var || '').toLowerCase();
      if (!theoreticalSeries && label.indexOf('theoretical power') !== -1) theoreticalSeries = series;
      if (!actualSeries && (label.indexOf('active power') !== -1 || label.indexOf('actual power') !== -1)) actualSeries = series;
    });
    if (actualSeries && theoreticalSeries) drawDeviationFill(actualSeries, theoreticalSeries);

    // Lines
    seriesArr.forEach(function(series){
      ctx.strokeStyle = series.color || '#2563eb';
      ctx.lineWidth = series.thick ? 3 : 2;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath();
      var started = false;
      (series.values || []).forEach(function(v, idx){
        if (v == null || !isFinite(v)) { started = false; return; }
        var x = leftPad + idx * xStep;
        var y = toY(v);
        if (!started){
          ctx.moveTo(x, y);
          started = true;
        } else {
          ctx.lineTo(x, y);
        }
      });
      ctx.stroke();
      ctx.setLineDash([]);
    });
  }

  function buildDeviceSeries(rows, dates, vars){
    var rowMap = getRowMap(rows);
    var out = [];
    var count = vars.length || 1;
    vars.forEach(function(vn, idx){
      out.push({
        label: vn,
        var: vn,
        color: lineColor(idx, count),
        values: dates.map(function(d){
          var row = rowMap.get(d);
          var val = row ? parseFloat(row[vn]) : NaN;
          return isFinite(val) ? val : null;
        })
      });
    });
    return out;
  }

  function buildPowerSeries(rows, dates, aapVarName){
    if (!aapVarName) return [];
    var rowMap = getRowMap(rows);
    var variableNamesLocal = getVariableNames();
    var windVarName = variableNamesLocal.find(function(v){
      return String(v).toLowerCase().includes('average wind speed');
    });
    var tempVarName = variableNamesLocal.find(function(v){
      return String(v).toLowerCase().includes('average ambient temperature');
    });
    var actual = {
      label: aapVarName,
      var: aapVarName,
      color: '#d62728',
      values: dates.map(function(d){
        var row = rowMap.get(d);
        var val = row ? parseFloat(row[aapVarName]) : NaN;
        return isFinite(val) ? val : null;
      })
    };
    var list = [actual];
    if (windVarName && (typeof window.expectedPowerKWFromWSTemp === 'function' || typeof window.expectedPowerKWFromWS === 'function')) {
      var fn = (typeof window.expectedPowerKWFromWSTemp === 'function') ? window.expectedPowerKWFromWSTemp : window.expectedPowerKWFromWS;
      list.push({
        label: 'Theoretical Power (kW)',
        var: 'Theoretical Power (kW)',
        color: '#006400',
        dashed: true,
        thick: true,
        values: dates.map(function(d){
          var row = rowMap.get(d);
          if (!row) return null;
          var ws = parseFloat(row[windVarName]);
          var tC = tempVarName ? parseFloat(row[tempVarName]) : NaN;
          var val = isFinite(ws) ? fn(ws, tC) : NaN;
          return isFinite(val) ? val : null;
        })
      });
    }
    return list;
  }

  function renderMultiTurbineCharts(){
    var wrap = ensureMultiContainer();
    if (!wrap) return false;

    var explicitTurbs = Array.from(getSelectedTurbines());
    if (explicitTurbs.length <= 1) {
      wrap.style.display = 'none';
      wrap.innerHTML = '';
      return false;
    }

    var data = getDisplayData();
    if (!Array.isArray(data) || !data.length) {
      wrap.style.display = 'none';
      wrap.innerHTML = '';
      return true;
    }

    var selectedVarsLocal = getSelectedVars();
    var variableNamesLocal = getVariableNames();
    var explicitVars = [];
    if (selectedVarsLocal && variableNamesLocal && selectedVarsLocal.size > 0 && selectedVarsLocal.size <= variableNamesLocal.length) {
      explicitVars = Array.from(selectedVarsLocal);
    }
    var mainVars = (explicitVars.length > 0 ? explicitVars : variableNamesLocal.slice()).filter(function(v){
      return !isAAPVar(v);
    });
    var aapVarName = variableNamesLocal.find(function(v){ return isAAPVar(v); });
    var wantsAAP = !!aapVarName && (explicitVars.length === 0 || explicitVars.indexOf(aapVarName) !== -1);

    wrap.innerHTML = '';
    explicitTurbs.forEach(function(dev){
      var deviceRows = data.filter(function(r){ return r && r['Device'] === dev; });
      if (!deviceRows.length) return;
      var dates = sortDates(Array.from(new Set(deviceRows.map(function(r){ return r['Date']; }).filter(Boolean))));
      if (!dates.length) return;

      var card = document.createElement('section');
      card.className = 'mt-chart-card';

      var title = document.createElement('h3');
      title.className = 'mt-chart-title';
      title.textContent = 'Turbine ' + dev;
      card.appendChild(title);

      var grid = document.createElement('div');
      grid.className = 'mt-chart-grid';

      if (mainVars.length){
        var mainBlock = document.createElement('div');
        mainBlock.className = 'mt-chart-block';
        mainBlock.innerHTML = '<h4>Main variables</h4>';
        var mainCanvas = document.createElement('canvas');
        mainCanvas.className = 'mt-chart-canvas';
        mainBlock.appendChild(mainCanvas);
        grid.appendChild(mainBlock);
      }

      if (wantsAAP){
        var powerBlock = document.createElement('div');
        powerBlock.className = 'mt-chart-block';
        powerBlock.innerHTML = '<h4>Average Active Power / Theoretical Power</h4>';
        var powerCanvas = document.createElement('canvas');
        powerCanvas.className = 'mt-chart-canvas';
        powerBlock.appendChild(powerCanvas);
        grid.appendChild(powerBlock);
      }

      if (!mainVars.length && !wantsAAP){
        var empty = document.createElement('div');
        empty.className = 'mt-empty';
        empty.textContent = 'No variables selected for this turbine.';
        grid.appendChild(empty);
      }

      card.appendChild(grid);
      wrap.appendChild(card);

      var canvases = grid.querySelectorAll('canvas');
      var nextCanvasIndex = 0;
      if (mainVars.length){
        drawLineChart(canvases[nextCanvasIndex], dates, buildDeviceSeries(deviceRows, dates, mainVars));
        nextCanvasIndex += 1;
      }
      if (wantsAAP){
        drawLineChart(canvases[nextCanvasIndex], dates, buildPowerSeries(deviceRows, dates, aapVarName));
      }
    });

    if (!wrap.children.length){
      wrap.innerHTML = '<div class="mt-empty">No data available for the selected turbines.</div>';
    }
    wrap.style.display = 'flex';

    var mainSingle = document.getElementById('chartContainer');
    var powerSingle = document.getElementById('powerChartContainer');
    if (mainSingle) mainSingle.style.display = 'none';
    if (powerSingle) powerSingle.style.display = 'none';
    return true;
  }

  function installPatch(){
    if (!window.updateChart || window.__multiTurbineFinalPatchInstalled) return;
    var prev = window.updateChart;
    window.__multiTurbineOriginalUpdateChart = prev;
    window.updateChart = function(){
      var explicitTurbs = Array.from(getSelectedTurbines());
      if (explicitTurbs.length > 1){
        renderMultiTurbineCharts();
        return;
      }
      var wrap = ensureMultiContainer();
      if (wrap){
        wrap.style.display = 'none';
        wrap.innerHTML = '';
      }
      return prev.apply(this, arguments);
    };
    window.__multiTurbineFinalPatchInstalled = true;
  }

  function init(){
    ensureMultiContainer();
    installPatch();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

  window.addEventListener('resize', function(){
    var explicitTurbs = Array.from(getSelectedTurbines());
    if (explicitTurbs.length > 1){
      setTimeout(function(){ try { renderMultiTurbineCharts(); } catch(e){} }, 60);
    }
  });
})();
</script>

  #multiTurbineCharts .mt-chart-wrap { position: relative; }

  #multiTurbineCharts .mt-chart-overlay {
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:5;
  }
</style>

    position:absolute;
    z-index:9;
    pointer-events:none;
    display:none;
    left:0;
    top:0;
  }
</style>

<script id="multi-turbine-hairline-only-patch">
(function(){
  function getSelectedTurbines(){ try { return Array.from(selectedTurbines || []); } catch(e){ return Array.from((window.selectedTurbines)||[]); } }
  function getSelectedVars(){
    try {
      if (selectedVars && variableNames && selectedVars.size > 0 && selectedVars.size <= variableNames.length) return Array.from(selectedVars);
      return [];
    } catch(e){ return []; }
  }
  function getVariableNames(){ try { return Array.from(variableNames || []); } catch(e){ return Array.from(window.variableNames || []); } }
  function getDisplayData(){ try { return Array.from(displayData || []); } catch(e){ return Array.from(window.displayData || []); } }
  function isAAPVar(v){
    try { if (typeof isAAP === 'function') return isAAP(v); } catch(e){}
    return String(v || '').toLowerCase().includes('average active power');
  }
  function lineColor(idx, total){
    try { if (typeof darkColor === 'function') return darkColor(idx, total); } catch(e){}
    var palette = ['#2563eb','#dc2626','#16a34a','#9333ea','#ea580c','#0891b2','#e11d48','#4f46e5'];
    return palette[idx % palette.length];
  }
  function parseDateValue(s){
    if (!s) return NaN;
    var d = new Date(String(s).replace(' ', 'T'));
    if (!isNaN(d.getTime())) return d.getTime();
    d = new Date(s);
    return d.getTime();
  }
  function sortDates(list){
    return list.slice().sort(function(a,b){ return parseDateValue(a) - parseDateValue(b); });
  }
  function shortDateLabel(s){
    if (!s) return '';
    var str = String(s);
    var parts = str.split(' ');
    if (parts.length >= 2) return parts[1].slice(0,5);
    return str;
  }
  function ensureWrap(){
    var existing = document.getElementById('multiTurbineCharts');
    if (existing) return existing;
    var anchor = document.getElementById('powerChartContainer') || document.getElementById('chartContainer');
    if (!anchor || !anchor.parentNode) return null;
    var div = document.createElement('div');
    div.id = 'multiTurbineCharts';
    anchor.parentNode.insertBefore(div, anchor.nextSibling);
    return div;
  }
  function getRowMap(rows){
    var map = new Map();
    rows.forEach(function(row){ if (row && row['Date']) map.set(row['Date'], row); });
    return map;
  }
  function getSeriesYRange(seriesArr){
    var yMin = Infinity, yMax = -Infinity;
    seriesArr.forEach(function(series){
      (series.values || []).forEach(function(v){
        if (v == null || !isFinite(v)) return;
        if (v < yMin) yMin = v;
        if (v > yMax) yMax = v;
      });
    });
    if (!isFinite(yMin) || !isFinite(yMax)) return null;
    if (yMin === yMax) { yMin -= 1; yMax += 1; }
    else {
      var pad = (yMax - yMin) * 0.1;
      yMin -= pad; yMax += pad;
    }
    return { yMin:yMin, yMax:yMax };
  }
  function buildDeviceSeries(rows, dates, vars){
    var rowMap = getRowMap(rows);
    return vars.map(function(vn, idx){
      return {
        label: vn, var: vn, color: lineColor(idx, vars.length || 1),
        values: dates.map(function(d){
          var row = rowMap.get(d);
          var val = row ? parseFloat(row[vn]) : NaN;
          return isFinite(val) ? val : null;
        })
      };
    });
  }
  function buildPowerSeries(rows, dates, aapVarName){
    if (!aapVarName) return [];
    var rowMap = getRowMap(rows);
    var variableNamesLocal = getVariableNames();
    var windVarName = variableNamesLocal.find(function(v){ return String(v).toLowerCase().includes('average wind speed'); });
    var tempVarName = variableNamesLocal.find(function(v){ return String(v).toLowerCase().includes('average ambient temperature'); });
    var actual = {
      label: aapVarName, var: aapVarName, color: '#d62728',
      values: dates.map(function(d){
        var row = rowMap.get(d);
        var val = row ? parseFloat(row[aapVarName]) : NaN;
        return isFinite(val) ? val : null;
      })
    };
    var out = [actual];
    if (windVarName && (typeof window.expectedPowerKWFromWSTemp === 'function' || typeof window.expectedPowerKWFromWS === 'function')) {
      var fn = (typeof window.expectedPowerKWFromWSTemp === 'function') ? window.expectedPowerKWFromWSTemp : window.expectedPowerKWFromWS;
      out.push({
        label:'Theoretical Power (kW)', var:'Theoretical Power (kW)', color:'#006400', dashed:true, thick:true,
        values: dates.map(function(d){
          var row = rowMap.get(d);
          if (!row) return null;
          var ws = parseFloat(row[windVarName]);
          var tC = tempVarName ? parseFloat(row[tempVarName]) : NaN;
          var val = isFinite(ws) ? fn(ws, tC) : NaN;
          return isFinite(val) ? val : null;
        })
      });
    }
    return out;
  }
  function setupOverlay(baseCanvas, overlay){
    if (!baseCanvas || !overlay) return null;
    var dpr = window.devicePixelRatio || 1;
    var rect = baseCanvas.getBoundingClientRect();
    overlay.width = Math.max(1, Math.floor(rect.width * dpr));
    overlay.height = Math.max(1, Math.floor(rect.height * dpr));
    overlay.style.width = rect.width + 'px';
    overlay.style.height = rect.height + 'px';
    var ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);
    return { ctx: ctx, rect: rect };
  }
  function drawHairlineLocal(baseCanvas, overlay, geom, dates, idx){
    if (!baseCanvas || !overlay || !geom) return;
    var s = setupOverlay(baseCanvas, overlay);
    if (!s) return;
    if (idx == null || !dates || !dates.length) return;
    var x = geom.leftPad + Math.max(0, Math.min(idx, dates.length - 1)) * geom.xStep;
    s.ctx.save();
    s.ctx.strokeStyle = '#d00';
    s.ctx.lineWidth = 1;
    s.ctx.beginPath();
    s.ctx.moveTo(x, geom.topPad);
    s.ctx.lineTo(x, geom.topPad + geom.chartH);
    s.ctx.stroke();
    s.ctx.restore();
  }
  function drawLineChartWithGeom(canvas, dates, seriesArr){
    if (!canvas || !dates || !dates.length || !seriesArr || !seriesArr.length) return null;
    var rect = canvas.getBoundingClientRect();
    var width = Math.max(300, Math.floor(rect.width || canvas.clientWidth || 900));
    var height = Math.max(220, Math.floor(rect.height || 320));
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);

    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, width, height);

    var leftPad = 60, rightPad = 20, topPad = 36, bottomPad = 48;
    var chartW = Math.max(60, width - leftPad - rightPad);
    var chartH = Math.max(60, height - topPad - bottomPad);
    var xStep = chartW / Math.max(1, dates.length - 1);
    var yr = getSeriesYRange(seriesArr);
    if (!yr) return null;
    var yMin = yr.yMin, yMax = yr.yMax;
    var yDenom = (yMax - yMin) || 1;

    function toY(v){ return topPad + chartH - ((v - yMin) / yDenom) * chartH; }

    function drawDeviationFill(actualSeries, theoreticalSeries){
      if (!actualSeries || !theoreticalSeries) return;
      var valsA = Array.isArray(actualSeries.values) ? actualSeries.values : [];
      var valsT = Array.isArray(theoreticalSeries.values) ? theoreticalSeries.values : [];
      var len = Math.min(valsA.length, valsT.length);
      if (len < 2) return;

      function signOf(diff){ return diff > 0 ? 1 : (diff < 0 ? -1 : 0); }
      function fillQuad(x0, yA0, yT0, x1, yA1, yT1, sign) {
        if (sign == null || !isFinite(sign)) return;
        ctx.beginPath();
        ctx.moveTo(x0, yA0); ctx.lineTo(x1, yA1); ctx.lineTo(x1, yT1); ctx.lineTo(x0, yT0);
        ctx.closePath();
        ctx.fillStyle = sign > 0 ? 'rgba(34, 197, 94, 0.18)' : (sign < 0 ? 'rgba(239, 68, 68, 0.18)' : 'rgba(148, 163, 184, 0.12)');
        ctx.fill();
      }

      ctx.save();
      ctx.beginPath();
      ctx.rect(leftPad, topPad, chartW, chartH);
      ctx.clip();

      for (var i = 1; i < len; i++){
        var a0 = valsA[i - 1], a1 = valsA[i];
        var t0 = valsT[i - 1], t1 = valsT[i];
        if (![a0, a1, t0, t1].every(function(v){ return v != null && isFinite(v); })) continue;
        var x0 = leftPad + (i - 1) * xStep, x1 = leftPad + i * xStep;
        var yA0 = toY(a0), yA1 = toY(a1), yT0 = toY(t0), yT1 = toY(t1);
        var d0 = a0 - t0, d1 = a1 - t1;
        var pct0 = (t0 != null && isFinite(t0) && Math.abs(t0) > 1e-9) ? Math.abs((t0 - a0) / t0) * 100 : null;
        var pct1 = (t1 != null && isFinite(t1) && Math.abs(t1) > 1e-9) ? Math.abs((t1 - a1) / t1) * 100 : null;
        var s0 = signOf(d0), s1 = signOf(d1);
        if (s0 === 0 && s1 === 0) continue;
        if (s0 === 0) s0 = s1;
        if (s1 === 0) s1 = s0;

        if (s0 === s1) { fillQuad(x0, yA0, yT0, x1, yA1, yT1, s0); continue; }

        var frac = (d0 - d1) !== 0 ? (d0 / (d0 - d1)) : 0.5;
        var xc = x0 + (x1 - x0) * frac;
        var yCross = yA0 + (yA1 - yA0) * frac;
        fillQuad(x0, yA0, yT0, xc, yCross, yCross, s0);
        fillQuad(xc, yCross, yCross, x1, yA1, yT1, s1);
      }
      ctx.restore();
    }

    var lx = leftPad, ly = 16;
    ctx.font = '12px Arial';
    ctx.textBaseline = 'middle';
    seriesArr.forEach(function(series){
      ctx.strokeStyle = series.color || '#2563eb';
      ctx.lineWidth = 2.5;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 16, ly); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
      ctx.textAlign = 'left';
      var label = series.label || series.var || '';
      ctx.fillText(label, lx + 22, ly);
      lx += Math.min(260, 34 + ctx.measureText(label).width);
    });

    ctx.strokeStyle = 'rgba(120,130,150,0.25)';
    ctx.lineWidth = 1;
    var yTicks = 5;
    ctx.font = '12px Arial';
    for (var i=0; i<=yTicks; i++){
      var t = i / yTicks;
      var y = topPad + chartH - t * chartH;
      var val = (yMin + t * (yMax - yMin)).toFixed(2);
      ctx.beginPath(); ctx.moveTo(leftPad, y); ctx.lineTo(leftPad + chartW, y); ctx.stroke();
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle'; ctx.fillText(val, leftPad - 6, y);
    }

    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(leftPad, topPad); ctx.lineTo(leftPad, topPad + chartH);
    ctx.lineTo(leftPad + chartW, topPad + chartH); ctx.stroke();

    var labelCount = Math.min(8, dates.length);
    var skip = Math.max(1, Math.ceil(dates.length / labelCount));
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (var j=0; j<dates.length; j+=skip){
      var x = leftPad + j * xStep;
      ctx.fillText(shortDateLabel(dates[j]), x, topPad + chartH + 8);
    }

    var theoreticalSeries = null, actualSeries = null;
    seriesArr.forEach(function(series){
      var label = String(series.label || series.var || '').toLowerCase();
      if (!theoreticalSeries && label.indexOf('theoretical power') !== -1) theoreticalSeries = series;
      if (!actualSeries && (label.indexOf('active power') !== -1 || label.indexOf('actual power') !== -1)) actualSeries = series;
    });
    if (actualSeries && theoreticalSeries) drawDeviationFill(actualSeries, theoreticalSeries);

    seriesArr.forEach(function(series){
      ctx.strokeStyle = series.color || '#2563eb';
      ctx.lineWidth = series.thick ? 3 : 2;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath();
      var started = false;
      (series.values || []).forEach(function(v, idx){
        if (v == null || !isFinite(v)) { started = false; return; }
        var x = leftPad + idx * xStep;
        var y = toY(v);
        if (!started){ ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
      });
      ctx.stroke();
      ctx.setLineDash([]);
    });

    return { baseCanvas: canvas, leftPad:leftPad, topPad:topPad, chartW:chartW, chartH:chartH, xStep:xStep, yMin:yMin, yMax:yMax };
  }
  function hideTooltip(item){
    if (item && item.tooltip) item.tooltip.style.display = 'none';
  }
  function formatValue(val, suffix){
    if (val == null || !isFinite(val)) return '—';
    var num = Number(val);
    return (Number.isInteger(num) ? String(num) : num.toFixed(3).replace(/0+$/,'').replace(/\.$/, '')) + (suffix || '');
  }
  function buildTooltipHTMLLocal(item, idx, activeSeries){
    if (!item || !activeSeries || idx == null) return '';
    var dateStr = (item.dates && item.dates[idx]) ? item.dates[idx] : '';
    var value = activeSeries.values ? activeSeries.values[idx] : null;
    var suffix = item.type === 'power' ? ' kW' : '';
    var extraRows = (window.__xminBuildRunningStopExtraRows ? window.__xminBuildRunningStopExtraRows(item, idx, activeSeries) : '');

    if (item.type === 'power') {
      var actualSeries = (item.series || []).find(function(s){
        var label = String((s && (s.var || s.label)) || '').toLowerCase();
        return label.indexOf('active power') !== -1 || label.indexOf('actual power') !== -1;
      });
      var theoreticalSeries = (item.series || []).find(function(s){
        return String((s && (s.var || s.label)) || '').toLowerCase().indexOf('theoretical power') !== -1;
      });
      var actual = actualSeries && actualSeries.values ? actualSeries.values[idx] : null;
      var theoretical = theoreticalSeries && theoreticalSeries.values ? theoreticalSeries.values[idx] : null;
      var powerDifference = (actual != null && isFinite(actual) && theoretical != null && isFinite(theoretical)) ? (actual - theoretical) : null;
      var deviationPct = ((actual != null && isFinite(actual) && theoretical != null && isFinite(theoretical)) && isFinite(theoretical) && Math.abs(theoretical) > 1e-9) ? (((actual - theoretical) / theoretical) * 100) : null;
      var devColor = powerDifference == null ? 'var(--muted)' : (powerDifference >= 0 ? '#15803d' : '#dc2626');
      extraRows += '' +
        '<div class="tt-row"><span class="tt-label">Actual Power</span><span class="tt-value">' + formatValue(actual, ' kW') + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Theoretical Power</span><span class="tt-value">' + formatValue(theoretical, ' kW') + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Power Difference</span><span class="tt-value" style="color:' + devColor + '; font-weight:700;">' + (powerDifference == null ? '—' : ((powerDifference > 0 ? '+' : '') + formatValue(powerDifference, ' kW'))) + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Deviation %</span><span class="tt-value" style="color:' + devColor + '; font-weight:700;">' + (deviationPct == null ? '—' : ((deviationPct > 0 ? '+' : '') + formatValue(deviationPct, '%'))) + '</span></div>';
    }

    return '<div class="tooltip-card">' +
      '<div class="tt-body">' +
        '<div class="tt-row active"><span class="tt-label">Variable</span><span class="tt-value">' + String(activeSeries.var || activeSeries.label || '') + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Value</span><span class="tt-value">' + formatValue(value, suffix) + '</span></div>' +
        extraRows +
        '<div class="tt-row"><span class="tt-label">Turbine</span><span class="tt-value">' + String(item.device || '') + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Time</span><span class="tt-value">' + String(dateStr || '') + '</span></div>' +
      '</div>' +
    '</div>';
  }
  function showTooltip(item, evt, idx){
    if (!item || !item.tooltip || !item.geom || !item.series || !item.series.length) return;
    var r = item.canvas.getBoundingClientRect();
    var my = evt.clientY - r.top;
    var py = my - item.geom.topPad;
    var vCursor = item.geom.yMax - (py / item.geom.chartH) * (item.geom.yMax - item.geom.yMin);
    var best = null, bestDist = Infinity;
    (item.series || []).forEach(function(s){
      var v = s && s.values ? s.values[idx] : null;
      if (v == null || !isFinite(v)) return;
      var d = Math.abs(v - vCursor);
      if (d < bestDist) { bestDist = d; best = s; }
    });
    if (!best) { hideTooltip(item); return; }

    item.tooltip.innerHTML = buildTooltipHTMLLocal(item, idx, best);
    item.tooltip.style.display = 'block';
    item.tooltip.style.left = '0px';
    item.tooltip.style.top = '0px';

    var wrapRect = item.wrap.getBoundingClientRect();
    var x = (evt.clientX - wrapRect.left) + 12;
    var y = (evt.clientY - wrapRect.top) + 12;
    var maxX = Math.max(0, wrapRect.width - item.tooltip.offsetWidth - 8);
    var maxY = Math.max(0, wrapRect.height - item.tooltip.offsetHeight - 8);
    item.tooltip.style.left = Math.min(Math.max(0, x), maxX) + 'px';

        '<div class="tt-row"><span class="tt-label">Time</span><span class="tt-value">' + String(dateStr || '') + '</span></div>' +
      '</div>' +
    '</div>';
  }
  function showTooltip(item, evt, idx){
    if (!item || !item.tooltip || !item.geom || !item.series || !item.series.length) return;
    var r = item.canvas.getBoundingClientRect();
    var my = evt.clientY - r.top;
    var py = my - item.geom.topPad;
    var vCursor = item.geom.yMax - (py / item.geom.chartH) * (item.geom.yMax - item.geom.yMin);
    var best = null, bestDist = Infinity;
    (item.series || []).forEach(function(s){
      var v = s && s.values ? s.values[idx] : null;
      if (v == null || !isFinite(v)) return;
      var d = Math.abs(v - vCursor);
      if (d < bestDist) { bestDist = d; best = s; }
    });
    if (!best) { hideTooltip(item); return; }
    item.tooltip.innerHTML = buildTooltipHTMLLocal(item, idx, best);
    item.tooltip.style.display = 'block';
    item.tooltip.style.left = '0px';
    item.tooltip.style.top = '0px';
    var wrapRect = item.wrap.getBoundingClientRect();
    var x = (evt.clientX - wrapRect.left) + 12;
    var y = (evt.clientY - wrapRect.top) + 12;
    var maxX = Math.max(0, wrapRect.width - item.tooltip.offsetWidth - 8);
    var maxY = Math.max(0, wrapRect.height - item.tooltip.offsetHeight - 8);
    item.tooltip.style.left = Math.min(Math.max(0, x), maxX) + 'px';
    item.tooltip.style.top = Math.min(Math.max(0, y), maxY) + 'px';
  }
  function mountSharedInteraction(card, dates){
    if (!card || !dates || !dates.length) return;
    var items = Array.from(card.querySelectorAll('.mt-chart-wrap')).map(function(wrap){
      return {
        wrap: wrap,
        canvas: wrap.querySelector('.mt-chart-canvas'),
        overlay: wrap.querySelector('.mt-chart-overlay'),
        tooltip: wrap.querySelector('.mt-chart-tooltip'),
        geom: wrap.__chartGeom || null,
        series: wrap.__chartSeries || [],
        dates: wrap.__chartDates || dates,
        type: wrap.__chartType || 'main',
        device: wrap.__chartDevice || ''
      };
    }).filter(function(x){ return x.canvas && x.overlay && x.geom; });
    if (!items.length) return;
    function clearAll(){
      items.forEach(function(item){
        drawHairlineLocal(item.canvas, item.overlay, item.geom, item.dates || dates, null);
        hideTooltip(item);
      });
    }
    function syncFromEvent(evt, sourceItem){
      if (!sourceItem || !sourceItem.geom) return;
      var r = sourceItem.canvas.getBoundingClientRect();
      var mx = evt.clientX - r.left;
      var px = mx - sourceItem.geom.leftPad;
      if (px < 0 || px > sourceItem.geom.chartW){ clearAll(); return; }
      var idx = Math.round(px / sourceItem.geom.xStep);
      items.forEach(function(item){
        drawHairlineLocal(item.canvas, item.overlay, item.geom, item.dates || dates, idx);
        if (item !== sourceItem) hideTooltip(item);
      });
      showTooltip(sourceItem, evt, idx);
    }
    items.forEach(function(item){
      if (item.wrap.__hairlineTooltipBoundDaySplit) return;
      var moveHandler = function(evt){ syncFromEvent(evt, item); };
      item.wrap.addEventListener('mousemove', moveHandler);
      item.wrap.addEventListener('pointermove', moveHandler);
      item.wrap.addEventListener('mouseleave', clearAll);
      item.wrap.__hairlineTooltipBoundDaySplit = true;
    });
  }
  function renderByDay(){
    var wrap = ensureWrap();
    if (!wrap) return false;
    var data = getDisplayData();
    var turbs = getSelectedTurbines();
    if (!Array.isArray(data) || !data.length || turbs.length !== 1) return false;
    var dev = turbs[0];
    var deviceRows = data.filter(function(r){ return r && r['Device'] === dev; });
    if (!deviceRows.length) return false;
    var dayKeys = sortDayKeys(Array.from(new Set(deviceRows.map(function(r){ return dayKeyOf(r['Date']); }).filter(Boolean))));
    if (dayKeys.length <= 1) return false;
    var varsExplicit = getSelectedVars();
    var allVars = getVariableNames();
    var mainVars = (varsExplicit.length ? varsExplicit : allVars.slice()).filter(function(v){ return !isAAPVar(v); });
    var aapVarName = allVars.find(function(v){ return isAAPVar(v); });
    var wantsAAP = !!aapVarName && (!varsExplicit.length || varsExplicit.indexOf(aapVarName) !== -1);
    wrap.innerHTML = '';
    dayKeys.forEach(function(dayKey){
      var dayRows = deviceRows.filter(function(r){ return dayKeyOf(r['Date']) === dayKey; });
      if (!dayRows.length) return;
      var dates = sortDates(Array.from(new Set(dayRows.map(function(r){ return r['Date']; }).filter(Boolean))));
      if (!dates.length) return;
      var card = document.createElement('section');
      card.className = 'mt-chart-card';
      var title = document.createElement('h3');
      title.className = 'mt-chart-title';
      title.textContent = 'Turbine ' + dev + ' — ' + dayKey;
      card.appendChild(title);
      var grid = document.createElement('div');
      grid.className = 'mt-chart-grid';
      if (mainVars.length){
        var mainBlock = document.createElement('div');
        mainBlock.className = 'mt-chart-block';
        mainBlock.innerHTML = '<h4>Main variables</h4><div class="mt-chart-wrap"><canvas class="mt-chart-canvas"></canvas><canvas class="mt-chart-overlay"></canvas><div class="mt-chart-tooltip"></div></div>';
        grid.appendChild(mainBlock);
      }
      if (wantsAAP){
        var powerBlock = document.createElement('div');
        powerBlock.className = 'mt-chart-block';
        powerBlock.innerHTML = '<h4>Average Active Power / Theoretical Power</h4><div class="mt-chart-wrap"><canvas class="mt-chart-canvas"></canvas><canvas class="mt-chart-overlay"></canvas><div class="mt-chart-tooltip"></div></div>';
        grid.appendChild(powerBlock);
      }
      if (!mainVars.length && !wantsAAP){
        var empty = document.createElement('div');
        empty.className = 'mt-empty';
        empty.textContent = 'No variables selected for this day.';
        grid.appendChild(empty);
      }
      card.appendChild(grid);
      wrap.appendChild(card);
      var wraps = Array.from(grid.querySelectorAll('.mt-chart-wrap'));
      var wi = 0;
      if (mainVars.length){
        var w1 = wraps[wi++];
        var c1 = w1.querySelector('.mt-chart-canvas');
        var mainSeries = buildDeviceSeries(dayRows, dates, mainVars);
        w1.__chartGeom = drawLineChartWithGeom(c1, dates, mainSeries);
        w1.__chartSeries = mainSeries;
        w1.__chartDates = dates;
        w1.__chartType = 'main';
        w1.__chartDevice = dev;
      }
      if (wantsAAP){
        var w2 = wraps[wi++];
        var c2 = w2.querySelector('.mt-chart-canvas');
        var powerSeries = buildPowerSeries(dayRows, dates, aapVarName);
        w2.__chartGeom = drawLineChartWithGeom(c2, dates, powerSeries);
        w2.__chartSeries = powerSeries;
        w2.__chartDates = dates;
        w2.__chartType = 'power';
        w2.__chartDevice = dev;
      }
      mountSharedInteraction(card, dates);
    });
    if (!wrap.children.length) return false;
    wrap.style.display = 'flex';
    var mainSingle = document.getElementById('chartContainer');
    var powerSingle = document.getElementById('powerChartContainer');
    if (mainSingle) mainSingle.style.display = 'none';
    if (powerSingle) powerSingle.style.display = 'none';
    return true;
  }
  function install(){
    if (!window.updateChart || window.__multiDayChartUpdateInstalled) return;
    var prev = window.updateChart;
    window.__multiDayPrevUpdate = prev;
    window.updateChart = function(){
      var data = getDisplayData();
      var turbs = getSelectedTurbines();
      if (Array.isArray(data) && data.length && turbs.length === 1) {
        var deviceRows = data.filter(function(r){ return r && r['Device'] === turbs[0]; });
        var dayKeys = Array.from(new Set(deviceRows.map(function(r){ return dayKeyOf(r['Date']); }).filter(Boolean)));
        if (dayKeys.length > 1) return renderByDay();
      }
      var wrap = ensureWrap();
      if (wrap){ wrap.style.display = 'none'; wrap.innerHTML = ''; }
      return prev.apply(this, arguments);
    };
    window.__multiDayChartUpdateInstalled = true;
  }
  function init(){ ensureWrap(); install(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
  var resizeTimer = null;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){
      try { if (typeof window.updateChart === 'function') window.updateChart(); } catch(e){}
    }, 80);
  });
})();
</script>
