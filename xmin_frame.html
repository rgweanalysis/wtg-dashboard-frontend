<script id="unified-multi-chart-patch-final">
(function(){
  if (window.__unifiedMultiChartPatchFinalInstalled) return;
  window.__unifiedMultiChartPatchFinalInstalled = true;

  function getSelectedTurbinesArr(){
    try {
      if (typeof selectedTurbines !== 'undefined' && selectedTurbines && typeof selectedTurbines.forEach === 'function') return Array.from(selectedTurbines);
    } catch(e){}
    if (window.selectedTurbines && typeof window.selectedTurbines.forEach === 'function') return Array.from(window.selectedTurbines);
    return [];
  }
  function getSelectedVarsArr(){
    try {
      if (typeof selectedVars !== 'undefined' && selectedVars && typeof selectedVars.forEach === 'function') return Array.from(selectedVars);
    } catch(e){}
    if (window.selectedVars && typeof window.selectedVars.forEach === 'function') return Array.from(window.selectedVars);
    return [];
  }
  function getVariableNamesArr(){
    try { if (Array.isArray(variableNames)) return variableNames.slice(); } catch(e){}
    if (Array.isArray(window.variableNames)) return window.variableNames.slice();
    return [];
  }
  function getDisplayDataArr(){
    try { if (Array.isArray(displayData)) return displayData.slice(); } catch(e){}
    if (Array.isArray(window.displayData)) return window.displayData.slice();
    return [];
  }
  function isAAPVar(name){
    return String(name || '').toLowerCase().indexOf('average active power') !== -1;
  }
  function colorFor(i, n){
    if (typeof darkColor === 'function') return darkColor(i, n);
    var hue = (i * 360 / Math.max(1, n)) % 360;
    return 'hsl(' + hue + ', 80%, 35%)';
  }
  function parseDateValue(s){
    var str = String(s || '').trim();
    if (!str) return NaN;
    if (typeof str === 'string') str = str.replace('T', ' ');
    var parts = str.split(' ');
    var d = (parts[0] || '').split('/');
    var t = (parts[1] || '00:00:00').split(':');
    if (d.length < 3) return NaN;
    return new Date(parseInt(d[0],10), parseInt(d[1],10)-1, parseInt(d[2],10), parseInt(t[0]||0,10), parseInt(t[1]||0,10), parseInt((t[2]||'0').split('.')[0],10)).getTime();
  }
  function dayKeyOf(s){
    return String(s || '').split(' ')[0] || '';
  }
  function shortTimeLabel(s){
    var parts = String(s || '').split(' ');
    return parts.length >= 2 ? parts[1].slice(0,5) : String(s || '');
  }
  function sortDates(list){
    return list.slice().sort(function(a,b){ return parseDateValue(a) - parseDateValue(b); });
  }
  function sortDayKeys(list){
    return list.slice().sort(function(a,b){ return parseDateValue(a + ' 00:00:00') - parseDateValue(b + ' 00:00:00'); });
  }
  function getRowMap(rows){
    var map = new Map();
    rows.forEach(function(r){ map.set(r['Date'], r); });
    return map;
  }
  function getSeriesYRange(seriesArr){
    var yMin = Infinity, yMax = -Infinity;
    (seriesArr || []).forEach(function(series){
      (series.values || []).forEach(function(v){
        if (v == null || !isFinite(v)) return;
        if (v < yMin) yMin = v;
        if (v > yMax) yMax = v;
      });
    });
    if (!isFinite(yMin) || !isFinite(yMax)) return null;
    if (yMin === yMax) { yMin -= 1; yMax += 1; }
    else {
      var pad = (yMax - yMin) * 0.1;
      yMin -= pad; yMax += pad;
    }
    return { yMin:yMin, yMax:yMax };
  }
  function buildDeviceSeries(rows, dates, vars){
    var rowMap = getRowMap(rows);
    return vars.map(function(vn, idx){
      return {
        label: vn,
        var: vn,
        color: colorFor(idx, vars.length || 1),
        values: dates.map(function(d){
          var row = rowMap.get(d);
          var val = row ? parseFloat(row[vn]) : NaN;
          return isFinite(val) ? val : null;
        })
      };
    });
  }
  function buildPowerSeries(rows, dates, aapVarName){
    if (!aapVarName) return [];
    var rowMap = getRowMap(rows);
    var vars = getVariableNamesArr();
    var windVarName = vars.find(function(v){ return String(v).toLowerCase().indexOf('average wind speed') !== -1; });
    var tempVarName = vars.find(function(v){ return String(v).toLowerCase().indexOf('average ambient temperature') !== -1; });
    var actual = {
      label: aapVarName,
      var: aapVarName,
      color: '#d62728',
      values: dates.map(function(d){
        var row = rowMap.get(d);
        var val = row ? parseFloat(row[aapVarName]) : NaN;
        return isFinite(val) ? val : null;
      })
    };
    var out = [actual];
    var fn = (typeof window.expectedPowerKWFromWSTemp === 'function') ? window.expectedPowerKWFromWSTemp :
             ((typeof window.expectedPowerKWFromWS === 'function') ? window.expectedPowerKWFromWS : null);
    if (windVarName && fn) {
      out.push({
        label:'Theoretical Power (kW)',
        var:'Theoretical Power (kW)',
        color:'#006400',
        dashed:true,
        thick:true,
        values: dates.map(function(d){
          var row = rowMap.get(d);
          if (!row) return null;
          var ws = parseFloat(row[windVarName]);
          var tC = tempVarName ? parseFloat(row[tempVarName]) : NaN;
          var val = isFinite(ws) ? fn(ws, tC) : NaN;
          return isFinite(val) ? val : null;
        })
      });
    }
    return out;
  }
  function setupOverlay(baseCanvas, overlay){
    if (!baseCanvas || !overlay) return null;
    var dpr = window.devicePixelRatio || 1;
    var rect = baseCanvas.getBoundingClientRect();
    overlay.width = Math.max(1, Math.floor(rect.width * dpr));
    overlay.height = Math.max(1, Math.floor(rect.height * dpr));
    overlay.style.width = rect.width + 'px';
    overlay.style.height = rect.height + 'px';
    var ctx = overlay.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);
    return { ctx: ctx, rect: rect };
  }
  function drawHairline(baseCanvas, overlay, geom, dates, idx){
    if (!baseCanvas || !overlay || !geom) return;
    var s = setupOverlay(baseCanvas, overlay);
    if (!s) return;
    if (idx == null || !dates || !dates.length) return;
    var x = geom.leftPad + Math.max(0, Math.min(idx, dates.length - 1)) * geom.xStep;
    s.ctx.save();
    s.ctx.strokeStyle = '#d00';
    s.ctx.lineWidth = 1;
    s.ctx.beginPath();
    s.ctx.moveTo(x + 0.5, geom.topPad);
    s.ctx.lineTo(x + 0.5, geom.topPad + geom.chartH);
    s.ctx.stroke();
    s.ctx.restore();
  }
  function drawChart(canvas, dates, seriesArr){
    if (!canvas || !dates || !dates.length || !seriesArr || !seriesArr.length) return null;

    var rect = canvas.getBoundingClientRect();
    var heightFromStyle = parseFloat(getComputedStyle(canvas).height) || canvas.clientHeight || 320;
    var width = Math.max(300, Math.floor(rect.width || canvas.clientWidth || 900));
    var height = Math.max(220, Math.floor(heightFromStyle));
    var dpr = window.devicePixelRatio || 1;

    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);

    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, width, height);
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    var leftPad = 60, rightPad = 20, topPad = 36, bottomPad = 48;
    var chartW = Math.max(60, width - leftPad - rightPad);
    var chartH = Math.max(60, height - topPad - bottomPad);
    var xStep = chartW / Math.max(1, dates.length - 1);
    var yr = getSeriesYRange(seriesArr);
    if (!yr) return null;
    var yMin = yr.yMin, yMax = yr.yMax;
    var yDenom = (yMax - yMin) || 1;

    function toY(v){ return topPad + chartH - ((v - yMin) / yDenom) * chartH; }

    function drawDeviationFill(actualSeries, theoreticalSeries){
      if (!actualSeries || !theoreticalSeries) return;
      var valsA = Array.isArray(actualSeries.values) ? actualSeries.values : [];
      var valsT = Array.isArray(theoreticalSeries.values) ? theoreticalSeries.values : [];
      var len = Math.min(valsA.length, valsT.length);
      if (len < 2) return;
      function signOf(diff){ return diff > 0 ? 1 : (diff < 0 ? -1 : 0); }
      function fillQuad(x0, yA0, yT0, x1, yA1, yT1, sign) {
        if (sign == null || !isFinite(sign)) return;
        ctx.beginPath();
        ctx.moveTo(x0, yA0); ctx.lineTo(x1, yA1); ctx.lineTo(x1, yT1); ctx.lineTo(x0, yT0);
        ctx.closePath();
        ctx.fillStyle = sign > 0 ? 'rgba(34, 197, 94, 0.18)' : (sign < 0 ? 'rgba(239, 68, 68, 0.18)' : 'rgba(148, 163, 184, 0.12)');
        ctx.fill();
      }
      ctx.save();
      ctx.beginPath();
      ctx.rect(leftPad, topPad, chartW, chartH);
      ctx.clip();
      for (var i = 1; i < len; i++){
        var a0 = valsA[i - 1], a1 = valsA[i];
        var t0 = valsT[i - 1], t1 = valsT[i];
        if (![a0, a1, t0, t1].every(function(v){ return v != null && isFinite(v); })) continue;
        var x0 = leftPad + (i - 1) * xStep, x1 = leftPad + i * xStep;
        var yA0 = toY(a0), yA1 = toY(a1), yT0 = toY(t0), yT1 = toY(t1);
        var d0 = a0 - t0, d1 = a1 - t1;
        var pct0 = (t0 != null && isFinite(t0) && Math.abs(t0) > 1e-9) ? Math.abs((t0 - a0) / t0) * 100 : null;
        var pct1 = (t1 != null && isFinite(t1) && Math.abs(t1) > 1e-9) ? Math.abs((t1 - a1) / t1) * 100 : null;
        var s0 = signOf(d0), s1 = signOf(d1);
        if (s0 === 0 && s1 === 0) continue;
        if (s0 === 0) s0 = s1;
        if (s1 === 0) s1 = s0;

        if (s0 === s1) { fillQuad(x0, yA0, yT0, x1, yA1, yT1, s0); continue; }

        var frac = (d0 - d1) !== 0 ? (d0 / (d0 - d1)) : 0.5;
        var xc = x0 + (x1 - x0) * frac;
        var yCross = yA0 + (yA1 - yA0) * frac;
        fillQuad(x0, yA0, yT0, xc, yCross, yCross, s0);
        fillQuad(xc, yCross, yCross, x1, yA1, yT1, s1);
      }
      ctx.restore();
    }

    var lx = leftPad, ly = 16;
    ctx.font = '12px Arial';
    ctx.textBaseline = 'middle';
    seriesArr.forEach(function(series){
      ctx.strokeStyle = series.color || '#2563eb';
      ctx.lineWidth = 2.5;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath();
      ctx.moveTo(lx, ly);
      ctx.lineTo(lx + 16, ly);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
      ctx.textAlign = 'left';
      var label = series.label || series.var || '';
      ctx.fillText(label, lx + 22, ly);
      lx += Math.min(260, 34 + ctx.measureText(label).width);
    });

    ctx.strokeStyle = 'rgba(120,130,150,0.25)';
    ctx.lineWidth = 1;
    ctx.font = '12px Arial';
    for (var i=0; i<=5; i++){
      var t = i / 5;
      var y = topPad + chartH - t * chartH;
      var val = (yMin + t * (yMax - yMin)).toFixed(2);
      ctx.beginPath();
      ctx.moveTo(leftPad, y);
      ctx.lineTo(leftPad + chartW, y);
      ctx.stroke();
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(val, leftPad - 6, y);
    }

    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(leftPad, topPad);
    ctx.lineTo(leftPad, topPad + chartH);
    ctx.lineTo(leftPad + chartW, topPad + chartH);
    ctx.stroke();

    var labelCount = Math.min(8, dates.length);
    var skip = Math.max(1, Math.ceil(dates.length / labelCount));
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (var j=0; j<dates.length; j+=skip){
      var x = leftPad + j * xStep;
      ctx.fillText(shortTimeLabel(dates[j]), x, topPad + chartH + 8);
    }

    var theoreticalSeries = null, actualSeries = null;
    seriesArr.forEach(function(series){

    return { ctx: ctx, rect: rect };
  }
  function drawHairline(item, idx){
    if (!item || !item.canvas || !item.overlay || !item.geom) return;
    var s = setupOverlay(item.canvas, item.overlay);
    if (!s) return;
    if (idx == null || !item.dates || !item.dates.length) return;
    var x = item.geom.leftPad + Math.max(0, Math.min(idx, item.dates.length - 1)) * item.geom.xStep;
    s.ctx.save();
    s.ctx.strokeStyle = '#d00';
    s.ctx.lineWidth = 1;
    s.ctx.beginPath();
    s.ctx.moveTo(x + 0.5, item.geom.topPad);
    s.ctx.lineTo(x + 0.5, item.geom.topPad + item.geom.chartH);
    s.ctx.stroke();
    s.ctx.restore();
  }
  function drawChartHQ(canvas, dates, seriesArr, heightPx){
    if (!canvas || !dates || !dates.length || !seriesArr || !seriesArr.length) return null;
    canvas.style.display = 'block';
    canvas.style.width = '100%';
    canvas.style.height = String(heightPx || 320) + 'px';
    var rect = canvas.getBoundingClientRect();
    var parentW = canvas.parentElement ? canvas.parentElement.clientWidth : 0;
    var width = Math.max(300, Math.floor(Math.max(rect.width || 0, canvas.clientWidth || 0, parentW || 0)));
    var height = Math.max(220, Math.floor(heightPx || parseFloat(getComputedStyle(canvas).height) || canvas.clientHeight || 320));
    var dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(width * dpr));
    canvas.height = Math.max(1, Math.floor(height * dpr));
    var ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, width, height);
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    var leftPad = 60, rightPad = 20, topPad = 36, bottomPad = 48;
    var chartW = Math.max(60, width - leftPad - rightPad);
    var chartH = Math.max(60, height - topPad - bottomPad);
    var xStep = chartW / Math.max(1, dates.length - 1);
    var yr = getSeriesYRange(seriesArr);
    if (!yr) return null;
    var yMin = yr.yMin, yMax = yr.yMax;
    var yDenom = (yMax - yMin) || 1;
    function toY(v){ return topPad + chartH - ((v - yMin) / yDenom) * chartH; }

    function drawDeviationFill(actualSeries, theoreticalSeries){
      if (!actualSeries || !theoreticalSeries) return;
      var valsA = Array.isArray(actualSeries.values) ? actualSeries.values : [];
      var valsT = Array.isArray(theoreticalSeries.values) ? theoreticalSeries.values : [];
      var len = Math.min(valsA.length, valsT.length);
      if (len < 2) return;
      function signOf(diff){ return diff > 0 ? 1 : (diff < 0 ? -1 : 0); }
      function fillQuad(x0, yA0, yT0, x1, yA1, yT1, sign) {
        if (sign == null || !isFinite(sign)) return;
        ctx.beginPath();
        ctx.moveTo(x0, yA0); ctx.lineTo(x1, yA1); ctx.lineTo(x1, yT1); ctx.lineTo(x0, yT0);
        ctx.closePath();
        ctx.fillStyle = sign > 0 ? 'rgba(34, 197, 94, 0.18)' : (sign < 0 ? 'rgba(239, 68, 68, 0.18)' : 'rgba(148, 163, 184, 0.12)');
        ctx.fill();
      }
      ctx.save();
      ctx.beginPath(); ctx.rect(leftPad, topPad, chartW, chartH); ctx.clip();
      for (var i = 1; i < len; i++){
        var a0 = valsA[i - 1], a1 = valsA[i], t0 = valsT[i - 1], t1 = valsT[i];
        if (![a0, a1, t0, t1].every(function(v){ return v != null && isFinite(v); })) continue;
        var x0 = leftPad + (i - 1) * xStep, x1 = leftPad + i * xStep;
        var yA0 = toY(a0), yA1 = toY(a1), yT0 = toY(t0), yT1 = toY(t1);
        var d0 = a0 - t0, d1 = a1 - t1;
        var pct0 = (t0 != null && isFinite(t0) && Math.abs(t0) > 1e-9) ? Math.abs((t0 - a0) / t0) * 100 : null;
        var pct1 = (t1 != null && isFinite(t1) && Math.abs(t1) > 1e-9) ? Math.abs((t1 - a1) / t1) * 100 : null;
        var s0 = signOf(d0), s1 = signOf(d1);
        if (s0 === 0 && s1 === 0) continue;
        if (s0 === 0) s0 = s1;
        if (s1 === 0) s1 = s0;

        if (s0 === s1) { fillQuad(x0, yA0, yT0, x1, yA1, yT1, s0); continue; }

        var frac = (d0 - d1) !== 0 ? (d0 / (d0 - d1)) : 0.5;
        var xc = x0 + (x1 - x0) * frac;
        var yCross = yA0 + (yA1 - yA0) * frac;
        fillQuad(x0, yA0, yT0, xc, yCross, yCross, s0);
        fillQuad(xc, yCross, yCross, x1, yA1, yT1, s1);
      }
      ctx.restore();
    }

    var lx = leftPad, ly = 16;
    ctx.font = '12px Arial';
    ctx.textBaseline = 'middle';
    seriesArr.forEach(function(series){
      ctx.strokeStyle = series.color || '#2563eb';
      ctx.lineWidth = 2.5;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 16, ly); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
      ctx.textAlign = 'left';
      var label = series.label || series.var || '';
      ctx.fillText(label, lx + 22, ly);
      lx += Math.min(260, 34 + ctx.measureText(label).width);
    });

    ctx.strokeStyle = 'rgba(120,130,150,0.25)';
    ctx.lineWidth = 1;
    ctx.font = '12px Arial';
    for (var i=0; i<=5; i++){
      var t = i / 5;
      var y = topPad + chartH - t * chartH;
      var val = (yMin + t * (yMax - yMin)).toFixed(2);
      ctx.beginPath(); ctx.moveTo(leftPad, y); ctx.lineTo(leftPad + chartW, y); ctx.stroke();
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(val, leftPad - 6, y);
    }

    ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--text') || '#111';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(leftPad, topPad); ctx.lineTo(leftPad, topPad + chartH); ctx.lineTo(leftPad + chartW, topPad + chartH); ctx.stroke();

    var labelCount = Math.min(8, dates.length);
    var skip = Math.max(1, Math.ceil(dates.length / labelCount));
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (var j=0; j<dates.length; j+=skip){
      var x = leftPad + j * xStep;
      ctx.fillText(shortTimeLabel(dates[j]), x, topPad + chartH + 8);
    }

    var theoreticalSeries = null, actualSeries = null;
    seriesArr.forEach(function(series){
      var label = String(series.label || series.var || '').toLowerCase();
      if (!theoreticalSeries && label.indexOf('theoretical power') !== -1) theoreticalSeries = series;
      if (!actualSeries && (label.indexOf('active power') !== -1 || label.indexOf('actual power') !== -1)) actualSeries = series;
    });
    if (actualSeries && theoreticalSeries) drawDeviationFill(actualSeries, theoreticalSeries);

    seriesArr.forEach(function(series){
      ctx.strokeStyle = series.color || '#2563eb';
      ctx.lineWidth = series.thick ? 3 : 2;
      ctx.setLineDash(series.dashed ? [8,4] : []);
      ctx.beginPath();
      var started = false;
      (series.values || []).forEach(function(v, idx){
        if (v == null || !isFinite(v)) { started = false; return; }
        var x = leftPad + idx * xStep;
        var y = toY(v);
        if (!started){ ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
      });
      ctx.stroke();
      ctx.setLineDash([]);
    });

    return { baseCanvas: canvas, leftPad:leftPad, topPad:topPad, chartW:chartW, chartH:chartH, xStep:xStep, yMin:yMin, yMax:yMax };
  }
  function formatValue(val, suffix){
    if (val == null || !isFinite(val)) return '—';
    var num = Number(val);
    return (Number.isInteger(num) ? String(num) : num.toFixed(3).replace(/0+$/,'').replace(/\.$/, '')) + (suffix || '');
  }
  function buildTooltipHTML(item, idx, activeSeries){
    if (!item || !activeSeries || idx == null) return '';
    var dateStr = (item.dates && item.dates[idx]) ? item.dates[idx] : '';
    var value = activeSeries.values ? activeSeries.values[idx] : null;
    var suffix = item.type === 'power' ? ' kW' : '';
    var extraRows = (window.__xminBuildRunningStopExtraRows ? window.__xminBuildRunningStopExtraRows(item, idx, activeSeries) : '');
    if (item.type === 'power') {
      var actualSeries = (item.series || []).find(function(s){ var label = String((s && (s.var || s.label)) || '').toLowerCase(); return label.indexOf('active power') !== -1 || label.indexOf('actual power') !== -1; });
      var theoreticalSeries = (item.series || []).find(function(s){ return String((s && (s.var || s.label)) || '').toLowerCase().indexOf('theoretical power') !== -1; });
      var actual = actualSeries && actualSeries.values ? actualSeries.values[idx] : null;
      var theoretical = theoreticalSeries && theoreticalSeries.values ? theoreticalSeries.values[idx] : null;
      var powerDifference = (actual != null && isFinite(actual) && theoretical != null && isFinite(theoretical)) ? (actual - theoretical) : null;
      var deviationPct = ((actual != null && isFinite(actual) && theoretical != null && isFinite(theoretical)) && isFinite(theoretical) && Math.abs(theoretical) > 1e-9) ? (((actual - theoretical) / theoretical) * 100) : null;
      var devColor = powerDifference == null ? 'var(--muted)' : (powerDifference >= 0 ? '#15803d' : '#dc2626');
      extraRows += '' +
        '<div class="tt-row"><span class="tt-label">Actual Power</span><span class="tt-value">' + formatValue(actual, ' kW') + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Theoretical Power</span><span class="tt-value">' + formatValue(theoretical, ' kW') + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Power Difference</span><span class="tt-value" style="color:' + devColor + '; font-weight:700;">' + (powerDifference == null ? '—' : ((powerDifference > 0 ? '+' : '') + formatValue(powerDifference, ' kW'))) + '</span></div>' +
        '<div class="tt-row"><span class="tt-label">Deviation %</span><span class="tt-value" style="color:' + devColor + '; font-weight:700;">' + (deviationPct == null ? '—' : ((deviationPct > 0 ? '+' : '') + formatValue(deviationPct, '%'))) + '</span></div>';
    }
    return '<div class="tooltip-card"><div class="tt-body">' +
      '<div class="tt-row active"><span class="tt-label">Variable</span><span class="tt-value">' + String(activeSeries.var || activeSeries.label || '') + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">Value</span><span class="tt-value">' + formatValue(value, suffix) + '</span></div>' +
      extraRows +
      '<div class="tt-row"><span class="tt-label">Turbine</span><span class="tt-value">' + String(item.device || '') + '</span></div>' +
      '<div class="tt-row"><span class="tt-label">Time</span><span class="tt-value">' + String(dateStr || '') + '</span></div>' +
      '</div></div>';
  }
  function hideTooltip(item){ if (item && item.tooltip) item.tooltip.style.display = 'none'; }

  function redrawWrap(wrap){
    if (!wrap) return;
    var canvas = wrap.querySelector('.hq-canvas');
    if (!canvas || !wrap.__hqSeries || !wrap.__hqDates) return;
    var h = wrap.__hqHeight || (wrap.__hqType === 'power' ? 360 : 700);
    wrap.__hqGeom = drawChartHQ(canvas, wrap.__hqDates, wrap.__hqSeries, h);
    wrap.__hqItem = null;
  }
  function ensureResizeObserver(wrap){

  function mountCardInteraction(card){
    if (!card) return;
    var items = Array.from(card.querySelectorAll('.hq-wrap')).map(function(wrap){
      var item = {
        wrap: wrap,
        canvas: wrap.querySelector('.hq-canvas'),
        overlay: wrap.querySelector('.hq-overlay'),
        tooltip: wrap.querySelector('.hq-tooltip'),
        geom: wrap.__hqGeom || null,
        series: wrap.__hqSeries || [],
        dates: wrap.__hqDates || [],
        type: wrap.__hqType || 'main',
        device: wrap.__hqDevice || ''
      };
      wrap.__hqItem = item;
      ensureResizeObserver(wrap);
      return item;
    }).filter(function(x){ return x.canvas && x.overlay && x.geom; });
    if (!items.length) return;

    function syncItemRefs(){
      items.forEach(function(item){
        item.geom = item.wrap.__hqGeom || item.geom;
        item.series = item.wrap.__hqSeries || item.series;
        item.dates = item.wrap.__hqDates || item.dates;
      });
    }
    function clearAll(){
      syncItemRefs();
      items.forEach(function(item){ drawHairline(item, null); hideTooltip(item); });
    }
    function showTooltip(item, evt, idx){
      syncItemRefs();
      if (!item || !item.tooltip || !item.geom || !item.series || !item.series.length) return;
      var r = item.canvas.getBoundingClientRect();
      var my = evt.clientY - r.top;
      var py = my - item.geom.topPad;
      var vCursor = item.geom.yMax - (py / item.geom.chartH) * (item.geom.yMax - item.geom.yMin);
      var best = null, bestDist = Infinity;
      (item.series || []).forEach(function(s){
        var v = s && s.values ? s.values[idx] : null;
        if (v == null || !isFinite(v)) return;
        var d = Math.abs(v - vCursor);
        if (d < bestDist) { bestDist = d; best = s; }
      });
      if (!best) { hideTooltip(item); return; }
      item.tooltip.innerHTML = buildTooltipHTML(item, idx, best);
      item.tooltip.style.display = 'block';
      item.tooltip.style.left = '0px';
      item.tooltip.style.top = '0px';
      var wrapRect = item.wrap.getBoundingClientRect();
      var x = (evt.clientX - wrapRect.left) + 12;
      var y = (evt.clientY - wrapRect.top) + 12;
      var maxX = Math.max(0, wrapRect.width - item.tooltip.offsetWidth - 8);
      var maxY = Math.max(0, wrapRect.height - item.tooltip.offsetHeight - 8);
      item.tooltip.style.left = Math.min(Math.max(0, x), maxX) + 'px';
      item.tooltip.style.top = Math.min(Math.max(0, y), maxY) + 'px';
    }
    function syncFromEvent(evt, sourceItem){
      syncItemRefs();
      if (!sourceItem || !sourceItem.geom) return;
      var r = sourceItem.canvas.getBoundingClientRect();
      var mx = evt.clientX - r.left;
      var px = mx - sourceItem.geom.leftPad;
      if (px < 0 || px > sourceItem.geom.chartW) { clearAll(); return; }
      var idx = Math.round(px / sourceItem.geom.xStep);
      items.forEach(function(item){
        drawHairline(item, idx);

      });
      showTooltip(sourceItem, evt, idx);
    }
    items.forEach(function(item){
      if (item.wrap.__hqBound) return;
      var moveHandler = function(evt){ syncFromEvent(evt, item); };
      item.canvas.addEventListener('mousemove', moveHandler);
      item.canvas.addEventListener('pointermove', moveHandler);
      item.canvas.addEventListener('mouseleave', clearAll);
      item.wrap.addEventListener('mouseleave', clearAll);
      item.wrap.__hqBound = true;
    });
  }

  function ensureHQWrap(){
    var wrap = document.getElementById('multiTurbineChartsHQ');
    if (!wrap){
      wrap = document.createElement('section');
      wrap.id = 'multiTurbineChartsHQ';
      var anchor = document.getElementById('chartContainer');
      if (anchor && anchor.parentNode) anchor.parentNode.insertBefore(wrap, anchor);
      else (document.getElementById('main') || document.body).appendChild(wrap);
    }
    return wrap;
  }
  function hideLegacyWraps(){
    ['multiTurbineChartsUnified','multiTurbineCharts'].forEach(function(id){ var el = document.getElementById(id); if (el) { el.style.display = 'none'; } });
  }
  function hideSingles(){ var a = document.getElementById('chartContainer'); var b = document.getElementById('powerChartContainer'); if (a) a.style.display = 'none'; if (b) b.style.display = 'none'; }
  function hideHQWrap(){ var wrap = document.getElementById('multiTurbineChartsHQ'); if (wrap) { wrap.style.display = 'none'; wrap.innerHTML = ''; } }

  function buildCard(titleText, rows, mainVars, wantsAAP, aapVarName, dev){
    var card = document.createElement('section');
    card.className = 'hq-card';
    card.innerHTML = '<h3 class="hq-title">' + titleText + '</h3><div class="hq-grid"></div>';
    var grid = card.querySelector('.hq-grid');
    var dates = sortDates(Array.from(new Set(rows.map(function(r){ return r['Date']; }).filter(Boolean))));
    if (!dates.length) return null;

    if (mainVars.length){
      var block1 = document.createElement('div');
      block1.className = 'hq-block';
      block1.innerHTML = '<h4>Main variables</h4><div class="hq-wrap"><canvas class="hq-canvas" data-role="main"></canvas><canvas class="hq-overlay"></canvas><div class="hq-tooltip"></div></div>';
      grid.appendChild(block1);
    }
    if (wantsAAP){
      var block2 = document.createElement('div');
      block2.className = 'hq-block';
      block2.innerHTML = '<h4>Average Active Power / Theoretical Power</h4><div class="hq-wrap"><canvas class="hq-canvas" data-role="power"></canvas><canvas class="hq-overlay"></canvas><div class="hq-tooltip"></div></div>';

        var w2 = wraps[wi++];

  }

  function renderMultiTurbinesHQ(data, turbs, varsExplicit, allVars){
    var wrap = ensureHQWrap();
    wrap.innerHTML = '';
    var mainVars = (varsExplicit.length ? varsExplicit : allVars.slice()).filter(function(v){ return !isAAPVar(v); });
    var aapVarName = allVars.find(function(v){ return isAAPVar(v); });
    var wantsAAP = !!aapVarName && (!varsExplicit.length || varsExplicit.indexOf(aapVarName) !== -1);

      var rows = data.filter(function(r){ return r && r['Device'] === dev; });

    }
    return false;
  }
  function renderMultiDaysHQ(data, dev, varsExplicit, allVars){
    var wrap = ensureHQWrap();
    wrap.innerHTML = '';
    var rowsForDev = data.filter(function(r){ return r && r['Device'] === dev; });
    var dayKeys = sortDayKeys(Array.from(new Set(rowsForDev.map(function(r){ return dayKeyOf(r['Date']); }).filter(Boolean))));
    var mainVars = (varsExplicit.length ? varsExplicit : allVars.slice()).filter(function(v){ return !isAAPVar(v); });
    var aapVarName = allVars.find(function(v){ return isAAPVar(v); });
    var wantsAAP = !!aapVarName && (!varsExplicit.length || varsExplicit.indexOf(aapVarName) !== -1);
    dayKeys.forEach(function(dayKey){
      var rows = rowsForDev.filter(function(r){ return dayKeyOf(r['Date']) === dayKey; });
      if (!rows.length) return;
      var card = buildCard('Turbine ' + dev + ' — ' + dayKey, rows, mainVars, wantsAAP, aapVarName, dev);
      if (card) wrap.appendChild(card);
    });
    wrap.style.display = wrap.children.length ? 'flex' : 'none';
    if (wrap.children.length) {
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ Array.from(wrap.children).forEach(function(card){ if (card.__renderNow) card.__renderNow(); }); }); });
      hideLegacyWraps(); hideSingles();
      return true;
    }
    return false;
  }

  function install(){
    if (!window.updateChart || window.__multiChartHQFixHookInstalled) return;
    var prev = window.updateChart;
    window.updateChart = function(){
      var data = getDisplayDataArr();
      var turbs = getSelectedTurbinesArr();
      var varsExplicit = getSelectedVarsArr();
      var allVars = getVariableNamesArr();
      if (Array.isArray(data) && data.length) {
        if (turbs.length > 1) {
          if (renderMultiTurbinesHQ(data, turbs, varsExplicit, allVars)) return true;
        }
        if (turbs.length === 1) {
          var rowsForDev = data.filter(function(r){ return r && r['Device'] === turbs[0]; });
          var dayKeys = Array.from(new Set(rowsForDev.map(function(r){ return dayKeyOf(r['Date']); }).filter(Boolean)));
          if (dayKeys.length > 1) {
            if (renderMultiDaysHQ(data, turbs[0], varsExplicit, allVars)) return true;
          }
        }
      }
      hideHQWrap();
      hideLegacyWraps();
      return prev.apply(this, arguments);
    };
    window.__multiChartHQFixHookInstalled = true;
  }

  function init(){ ensureHQWrap(); install(); }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

  var resizeTimer = null;
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function(){ try { if (typeof window.updateChart === 'function') window.updateChart(); } catch(e){} }, 100);
  });
})();
</script>

}
#tempOverviewSection .tempov-chip{

  font-size:13px;

}

  overflow:auto;
  max-height:520px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.tempov-row{
  display:grid;
  grid-template-columns:12px minmax(0,1fr) auto;
  gap:8px;
  align-items:center;
  background:var(--panel-2);

@media (max-width: 1100px){

<script id="temp-overview-script">
(function(){
  if (window.__tempOverviewInstalled) return;
  window.__tempOverviewInstalled = true;

  const state = {
    model: null,
    geom: null,
    hoverIdx: null,
    hoverSeries: null
  };

  function byId(id){ return document.getElementById(id); }
  function esc(s){
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'})[m];
    });
  }
  function toNum(v){
    if (v == null || v === '') return NaN;
    if (typeof v === 'number') return isFinite(v) ? v : NaN;
    let s = String(v).trim();
    if (!s) return NaN;
    if ((s.match(/,/g)||[]).length > (s.match(/\./g)||[]).length) s = s.replace(/\./g,'').replace(/,/g,'.');
    else s = s.replace(/,/g,'');
    const n = Number(s);
    return isFinite(n) ? n : NaN;
  }
  function parseDateMs(s){
    if (!s) return NaN;
    const x = String(s).trim().replace(' ', 'T').replace(/\//g, '-');
    let d = new Date(x);
    if (!isNaN(d)) return d.getTime();
    d = new Date(x.replace(/\.\d+$/, ''));
    return d.getTime();
  }
  function formatDateLabel(s){
    if (!s) return '';
    const parts = String(s).split(' ');
    if (parts.length < 2) return String(s);
    const date = parts[0].split(/[\/-]/);
    const time = parts[1].slice(0,5);
    if (date.length === 3) return date[1] + '/' + date[2] + ' ' + time;
    return String(s);
  }
  function formatTemp(v){
    return Number.isFinite(v) ? (Math.round(v * 100) / 100).toFixed(2) + ' °C' : '—';
  }
  function isTempVar(v){
    return /temp|temperature/i.test(String(v || ''));
  }
  function colorForKey(key){
    let hash = 0;
    const s = String(key || '');
    for (let i = 0; i < s.length; i++) hash = ((hash << 5) - hash) + s.charCodeAt(i);
    const hue = Math.abs(hash) % 360;
    const sat = 72;
    const light = 40 + (Math.abs(hash) % 16);
    return 'hsl(' + hue + ', ' + sat + '%, ' + light + '%)';
  }

  function ensureSection(){
    let sec = byId('tempOverviewSection');
    if (sec) return sec;
    sec = document.createElement('section');
    sec.id = 'tempOverviewSection';
    sec.innerHTML =
      '<div class="tempov-head">' +
        '<div>' +
          '<h3 class="tempov-title">Temperature overview across turbines</h3>' +
          '<p class="tempov-sub">All visible temperature variables for all visible turbines in one chart, with a hottest-points summary.</p>' +
        '</div>' +
        '<div class="tempov-chips">' +
          '<div class="tempov-chip" id="tempOverviewChipPeak">Peak: —</div>' +
          '<div class="tempov-chip" id="tempOverviewChipSeries">Curves: —</div>' +
          '<div class="tempov-chip" id="tempOverviewChipDevices">Turbines: —</div>' +
        '</div>' +
      '</div>' +
      '<div id="tempOverviewEmpty">No visible temperature data for the current filters.</div>' +
      '<div class="tempov-body" id="tempOverviewBody">' +
        '<div id="tempOverviewCanvasWrap">' +
          '<canvas id="tempOverviewCanvas"></canvas>' +
          '<canvas id="tempOverviewOverlay"></canvas>' +
          '<div id="tempOverviewTooltip"></div>' +
        '</div>' +
        '<aside id="tempOverviewLegendWrap">' +
          '<div id="tempOverviewLegendTitle">Top hottest curves</div>' +
          '<div id="tempOverviewLegend"></div>' +
        '</aside>' +
      '</div>';

    const main = byId('main') || document.body;
    const exceed = byId('exceedWrap');
    const footer = main.querySelector('footer');
    if (exceed && exceed.parentNode === main) main.insertBefore(sec, exceed);
    else if (footer && footer.parentNode === main) main.insertBefore(sec, footer);
    else main.appendChild(sec);
    return sec;
  }

  function readGlobalArray(name){
    try {
      if (Array.isArray(window[name])) return window[name];
    } catch(e) {}
    try {
      return Function('try { return (typeof ' + name + ' !== "undefined") ? ' + name + ' : []; } catch(e){ return []; }')();
    } catch(e) {}
    return [];
  }

  function buildModel(){
    const data = readGlobalArray('displayData').slice();
    const tempVars = readGlobalArray('variableNames').filter(isTempVar);
    if (!data.length || !tempVars.length){
      return { dates: [], series: [], devices: [], tempVars: [] };
    }

    const dates = Array.from(new Set(data.map(r => r && r.Date).filter(Boolean))).sort(function(a,b){
      return parseDateMs(a) - parseDateMs(b);
    });
    const devices = Array.from(new Set(data.map(r => r && r.Device).filter(Boolean))).sort();

    const deviceDateMap = Object.create(null);
    data.forEach(function(row){
      const dev = row && row.Device ? String(row.Device) : '';
      const dt = row && row.Date ? String(row.Date) : '';
      if (!dev || !dt) return;
      const key = dev + '||' + dt;
      deviceDateMap[key] = row;
    });

    const series = [];
    tempVars.forEach(function(v){
      devices.forEach(function(dev){
        const vals = dates.map(function(dt){
          const row = deviceDateMap[dev + '||' + dt];
          const n = row ? toNum(row[v]) : NaN;
          return Number.isFinite(n) ? n : null;
        });
        let maxVal = -Infinity, maxIdx = -1, count = 0;
        vals.forEach(function(val, idx){
          if (val == null) return;
          count++;
          if (val > maxVal){ maxVal = val; maxIdx = idx; }
        });
        if (!count) return;
        series.push({
          key: dev + ' • ' + v,
          device: dev,
          var: v,
          label: dev + ' • ' + v,
          values: vals,
          maxVal: maxVal,
          maxIdx: maxIdx,
          color: colorForKey(dev + '|' + v)
        });
      });
    });

    series.sort(function(a,b){ return b.maxVal - a.maxVal; });
    return { dates: dates, series: series, devices: devices, tempVars: tempVars };
  }

  function setCanvasSize(canvas){
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx: ctx, rect: rect };
  }

  function drawBase(model){
    const canvas = byId('tempOverviewCanvas');
    if (!canvas) return;
    const sized = setCanvasSize(canvas);
    const ctx = sized.ctx, rect = sized.rect;

    const leftPad = 76, rightPad = 18, topPad = 18, bottomPad = 42;
    const chartW = Math.max(10, rect.width - leftPad - rightPad);
    const chartH = Math.max(10, rect.height - topPad - bottomPad);
    const xStep = chartW / Math.max(1, model.dates.length - 1);

    let yMin = Infinity, yMax = -Infinity;
    model.series.forEach(function(s){
      s.values.forEach(function(v){
        if (v == null) return;
        if (v < yMin) yMin = v;
        if (v > yMax) yMax = v;
      });
    });
    if (!isFinite(yMin) || !isFinite(yMax)){
      yMin = 0; yMax = 1;
    }
    const pad = Math.max(2, (yMax - yMin) * 0.08);
    yMin -= pad; yMax += pad;

    ctx.clearRect(0, 0, rect.width, rect.height);
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--panel') || '#fff';
    ctx.fillRect(0, 0, rect.width, rect.height);

    ctx.save();
    ctx.strokeStyle = 'rgba(0,0,0,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 5; i++){
      const y = topPad + chartH - (i / 5) * chartH;
      ctx.beginPath();
      ctx.moveTo(leftPad, y);
      ctx.lineTo(leftPad + chartW, y);
      ctx.stroke();
      const val = (yMin + (i / 5) * (yMax - yMin)).toFixed(1);
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
      ctx.font = '12px Arial';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'middle';
      ctx.fillText(val, leftPad - 8, y);
    }

    ctx.strokeStyle = 'rgba(15,23,42,0.45)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(leftPad, topPad);
    ctx.lineTo(leftPad, topPad + chartH);
    ctx.lineTo(leftPad + chartW, topPad + chartH);
    ctx.stroke();

    const maxLabels = 8;
    const skip = Math.max(1, Math.ceil(model.dates.length / maxLabels));
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--muted') || '#64748b';
    ctx.font = '11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for (let i = 0; i < model.dates.length; i += skip){
      const x = leftPad + i * xStep;
      ctx.fillText(formatDateLabel(model.dates[i]), x, topPad + chartH + 8);
    }

    ctx.save();
    ctx.beginPath();
    ctx.rect(leftPad, topPad, chartW, chartH);
    ctx.clip();

    model.series.forEach(function(s, idx){
      ctx.beginPath();
      let started = false;
      s.values.forEach(function(v, i){
        if (v == null){ started = false; return; }
        const x = leftPad + i * xStep;
        const y = topPad + chartH - ((v - yMin) / (yMax - yMin)) * chartH;
        if (!started){ ctx.moveTo(x, y); started = true; }
        else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = s.color;
      ctx.globalAlpha = idx < 8 ? 0.92 : 0.45;
      ctx.lineWidth = idx < 8 ? 2 : 1.2;
      ctx.stroke();
    });
    ctx.restore();

    state.geom = { leftPad, rightPad, topPad, bottomPad, chartW, chartH, xStep, yMin, yMax, rect, canvas };
  }

  function drawOverlay(){
    const canvas = byId('tempOverviewOverlay');
    const tooltip = byId('tempOverviewTooltip');
    if (!canvas || !state.geom){
      if (tooltip) tooltip.style.display = 'none';
      return;
    }
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.max(1, Math.floor(rect.width * dpr));
    canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, rect.width, rect.height);

    const geom = state.geom;
    if (state.hoverIdx == null || !state.model || !state.model.series.length){
      if (tooltip) tooltip.style.display = 'none';
      renderLegend();
      return;
    }

    const x = geom.leftPad + state.hoverIdx * geom.xStep;
    ctx.save();
    ctx.strokeStyle = 'rgba(220, 38, 38, 0.38)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(x, geom.topPad);
    ctx.lineTo(x, geom.topPad + geom.chartH);
    ctx.stroke();
    ctx.setLineDash([]);

    const s = state.hoverSeries;
    if (s && s.values[state.hoverIdx] != null){
      const v = s.values[state.hoverIdx];
      if (tooltip){
        const time = state.model.dates[state.hoverIdx] || '';
        tooltip.innerHTML =
          '<div class="t1">' + esc(s.device) + '</div>' +
          '<div class="tr"><span class="k">Temperature</span><span>' + esc(s.var) + '</span></div>' +
          '<div class="tr"><span class="k">Value</span><span>' + esc(formatTemp(v)) + '</span></div>' +
          '<div class="tr"><span class="k">Time</span><span>' + esc(time) + '</span></div>' +
          '<div class="tr"><span class="k">Series peak</span><span>' + esc(formatTemp(s.maxVal)) + '</span></div>';
        tooltip.style.display = 'block';
      }
    }
    ctx.restore();
    renderLegend();
  }

  function renderLegend(){
    const box = byId('tempOverviewLegend');
    if (!box || !state.model) return;
    const activeKey = state.hoverSeries ? state.hoverSeries.key : '';
    const top = state.model.series.slice(0, 18);
    box.innerHTML = top.map(function(s, idx){
      const isActive = activeKey && activeKey === s.key;
      const time = state.model.dates[s.maxIdx] || '';
      return '<div class="tempov-row' + (isActive ? ' active' : '') + '" data-key="' + esc(s.key) + '">' +
        '<span class="tempov-swatch" style="background:' + esc(s.color) + ';"></span>' +
        '<div class="tempov-meta">' +
          '<div class="tempov-l1">' + esc(s.device) + '</div>' +
          '<div class="tempov-l2">' + esc(s.var) + '</div>' +
        '</div>' +
        '<div class="tempov-val" title="' + esc(time) + '">' + esc(formatTemp(s.maxVal)) + '</div>' +
      '</div>';
    }).join('');

    Array.from(box.querySelectorAll('.tempov-row')).forEach(function(row){
      row.addEventListener('mouseenter', function(){
        const key = row.getAttribute('data-key') || '';
        const found = state.model.series.find(function(s){ return s.key === key; });
        if (!found) return;
        state.hoverSeries = found;
        state.hoverIdx = found.maxIdx;
        drawOverlay();
      });
      row.addEventListener('mouseleave', function(){
        state.hoverSeries = null;
        state.hoverIdx = null;
        drawOverlay();
      });
    });
  }

  function updateSummary(){
    const peakChip = byId('tempOverviewChipPeak');
    const seriesChip = byId('tempOverviewChipSeries');
    const devicesChip = byId('tempOverviewChipDevices');
    const hottest = state.model && state.model.series && state.model.series.length ? state.model.series[0] : null;
    if (peakChip){
      peakChip.textContent = hottest ? ('Peak: ' + hottest.device + ' • ' + hottest.var + ' • ' + formatTemp(hottest.maxVal)) : 'Peak: —';
    }
    if (seriesChip){
      seriesChip.textContent = 'Curves: ' + ((state.model && state.model.series) ? state.model.series.length : 0);
    }
    if (devicesChip){
      devicesChip.textContent = 'Turbines: ' + ((state.model && state.model.devices) ? state.model.devices.length : 0);
    }
  }

  function showEmpty(show, msg){
    const empty = byId('tempOverviewEmpty');
    const body = byId('tempOverviewBody');
    if (!empty || !body) return;
    empty.textContent = msg || 'No visible temperature data for the current filters.';
    empty.style.display = show ? 'block' : 'none';
    body.style.display = show ? 'none' : 'grid';
  }

  function renderTemperatureOverview(){
    ensureSection();
    state.model = buildModel();
    const model = state.model;
    if (!model || !model.series || !model.series.length){
      showEmpty(true, 'No visible temperature data for the current filters.');
      const peakChip = byId('tempOverviewChipPeak');
      const seriesChip = byId('tempOverviewChipSeries');
      const devicesChip = byId('tempOverviewChipDevices');
      if (peakChip) peakChip.textContent = 'Peak: —';
      if (seriesChip) seriesChip.textContent = 'Curves: 0';
      if (devicesChip) devicesChip.textContent = 'Turbines: 0';
      return;
    }
    showEmpty(false);
    state.hoverIdx = null;
    state.hoverSeries = null;
    drawBase(model);
    updateSummary();
    renderLegend();
    drawOverlay();
  }

  function nearestSeriesAt(idx, yPx){
    const model = state.model, geom = state.geom;
    if (!model || !geom) return null;
    let best = null, bestDist = Infinity;
    model.series.forEach(function(s){
      const v = s.values[idx];
      if (v == null) return;
      const y = geom.topPad + geom.chartH - ((v - geom.yMin) / (geom.yMax - geom.yMin)) * geom.chartH;
      const d = Math.abs(y - yPx);
      if (d < bestDist){
        bestDist = d;
        best = s;
      }
    });
    return best;
  }

  function bindCanvas(){
    const wrap = byId('tempOverviewCanvasWrap');
    const tooltip = byId('tempOverviewTooltip');
    if (!wrap || wrap.__bound) return;
    wrap.__bound = true;

    wrap.addEventListener('mousemove', function(evt){
      if (!state.geom || !state.model || !state.model.series.length) return;
      const rect = state.geom.canvas.getBoundingClientRect();
      const mx = evt.clientX - rect.left;
      const my = evt.clientY - rect.top;
      const px = mx - state.geom.leftPad;
      const py = my - state.geom.topPad;
      if (px < 0 || px > state.geom.chartW || py < 0 || py > state.geom.chartH){
        state.hoverIdx = null;
        state.hoverSeries = null;
        drawOverlay();
        return;
      }
      const idx = Math.max(0, Math.min(state.model.dates.length - 1, Math.round(px / state.geom.xStep)));
      state.hoverIdx = idx;
      state.hoverSeries = nearestSeriesAt(idx, my);
      drawOverlay();
      if (tooltip && tooltip.style.display !== 'none'){
        tooltip.style.left = (evt.clientX + 12) + 'px';
        tooltip.style.top = (evt.clientY + 12) + 'px';
        const tr = tooltip.getBoundingClientRect();
        if (tr.right > window.innerWidth) tooltip.style.left = Math.max(8, evt.clientX - tr.width - 12) + 'px';
        if (tr.bottom > window.innerHeight) tooltip.style.top = Math.max(8, evt.clientY - tr.height - 12) + 'px';
      }
    });

    wrap.addEventListener('mouseleave', function(){
      state.hoverIdx = null;
      state.hoverSeries = null;
      drawOverlay();
      if (tooltip) tooltip.style.display = 'none';
    });
  }

  function installPatch(){
    if (typeof window.buildTable === 'function' && !window.buildTable.__tempOverviewPatched){
      const prev = window.buildTable;
      const patched = function(){
        const r = prev.apply(this, arguments);
        try { renderTemperatureOverview(); bindCanvas(); } catch(e){ console.error(e); }
        return r;
      };
      patched.__tempOverviewPatched = true;
      window.buildTable = patched;
    }
  }

  function init(){
    ensureSection();
    installPatch();
    bindCanvas();
    try { renderTemperatureOverview(); } catch(e){}
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();

  window.addEventListener('resize', function(){
    clearTimeout(window.__tempOverviewResizeTimer);
    window.__tempOverviewResizeTimer = setTimeout(function(){
      try { renderTemperatureOverview(); bindCanvas(); } catch(e){}
    }, 120);
  });
})();
</script>

<script id="xmin-chart-lookup-v2-flag">window.__XMIN_CHART_LOOKUP_V2__=true;</script>
